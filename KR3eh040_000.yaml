front:
  text: 序昔黃帝問岐伯曰余聞上古之人春秋皆度百歲而動作不衰今人年至半百而動作衰敝時勢異耶人將失之耶對曰上古之人法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱盡終其天年度百歲今人不能也以酒為漿以妄為常醉以入房以欲竭精耗散其真務快其心逆於生樂起居無節故半百而衰夫妄作則傷於形容耗真則傷於神氣疾之所起二臟先損心腎不交未老而羸未羸而病病至則重重則必斃嗚呼故上士施醫於未病之先保養於未敗之日善服藥不若善保養世有不善保養又不善服藥病入膏肓非藥石所能及也神哉應圓龔君業則軒岐心則天地囊括文雅著述成林於斯道得三昧焉憫二豎之為祟嘆庸流之偏執乃出其纂輯痰火一書行世問序於余余閲其著論立訣靡一不精別門分類靡一不詳未病之先有養生卻疾之術既病之後有調護攻治之法深探隱微窮盡玄變一團生氣浮於紙上所謂紅爐飛片雪龍虎自相隨八卦正位二豎消滅將壽世人皆為井谷中老矣通家弟鄧志謨拜題
