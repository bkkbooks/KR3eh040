body:
  text: 卷二火病結核夫結核者相火之所為痰火之徵兆也凡人病此不知預治鮮有不致危者何也蓋以腎水先虧相火隨熾熏迫津液凝聚於皮膚之下肌肉之上似癧非癧不紅不腫不甚痛苦久而乃潰人多怠忽其為證也初或寒熱似瘧形容漸悴久則肌肉漸消咳嗽因而失血潮汗遺滑等證蜂集見焉治之之法亦必益水清金滋陰抑陽兼以開結理氣之品務使水升火降津液流通核消塊散庶無後慮矣倘因循失治致於肌肉脫盡形體尪羸塊腐核爛勢若壞都可復御乎慎之慎之聖謂結核之由與瘡瘍癰毒之類大異倘誤治之為害非細何則經曰諸痛癢瘍瘡皆屬心火以其心火迫血而成此實證也治法未潰者則宜涼血解毒或以苦寒驅毒之藥攻下已潰者則宜排膿內托膿散毒解則愈若夫結核由治不然蓋始於真陰先竭相火燔蒸熏迫津液拂結凝聚日積月纍乃成故久而不潰此虛證也初無痰火諸證形體如故而但見核者惟在開結降火消痰理氣核消結散則已猶火迫滷而為𨢑得水浸潤復解之義若初猶豫怠緩致諸核遍潰形體消瘦則潮汗遺血自是蜂起矣此蓋陰虛之極相火益炎所以孤陽愈急而微陰亦自難遂故氣散血聚以致諸核遍潰或無完膚者有之當此之際治必本而標之乃曰圓神法以清金益水為君益陽養陰為佐開結降火為使必使水升火降津液流通潰者斂而結者散庶亢害承製五臟氣平是猶寒谷一枝而噓陽和之一例也倘以苦寒峻攻或以瘡瘍例治是猶渴飲鴆寧不促其斃乎大抵瘰癧痰核馬刀皆少陽膽氣應逆相火燔炙治必開結疏利令膽氣通暢結自解矣結核主方治相火迫聚津液凝結成核或繞頂夾耳或循脅肋不紅不腫不作膿者謂之痰核此痰火之機急宜消散初無痰火之證但見核者宜此主之玄參忌錢一錢五分滋陰降火為消核之要品桔梗一錢為舟楫之藥連翹帶子一錢五分開結降火射干去根一錢消癭散結黃芩酒炒一錢清金降火海藻海帶昆布水洗各一錢並咸以軟堅蒲公英一錢散頸項結核白殭蠶炒一錢去風消核紫背天葵乾者一錢消癭散核之要藥夏枯草乾者一錢消核散塊甘草一錢瀉火緩急薄荷八分清上消熱川貝一錢消核清痰解毒天花粉一錢消核清熱牡蠣火煅一錢頸項核用茶引之脅下核以厚朴引壯體實者加酒炒大黃一分上十七味皆消核之專品作一劑水煎食後入薑汁竹瀝同服若核在頸側脅肋少陽之分加柴胡八分在頭項太陽之分加羌活五分又結核主方治結核已潰而有痰火諸證者宜此主之玄參忌鐵一錢桔梗一錢沙參一錢連翹帶子一錢知母蜜炒一錢貝母八分天門冬去心皮一錢麥門冬去心一錢陳皮去白一錢甘草八分海藻海帶昆布各洗一錢白茯苓去皮一錢柴胡八分黃耆蜜炒一錢上十六味作一劑水煎食後服仍看核結何分加引若氣虛脈微緩者加人參五分他證悉如前痰火主方例增減附諸捷方痰瘤結核大者如拳小者如栗用南星研末醋調作餅貼之或以艾炷於上日灸三五壯惟使溫散勿使過熱傷皮後不便灸也良驗消核散結用大蒜同食茱萸搗塗枕後腦痹痰核用浮石燒研入輕粉油調塗或以百合同萆麻仁研塗消痰核用夏枯草煎膏貼之數日立消治結核瘰瘍癭瘤神方用海帶海藻昆布海螵蛸海石各一兩紫背天葵曬乾二兩夏枯草曬乾二兩連翹帶子二兩貝母一兩桔梗一兩天花粉一兩皂角刺五錢俱為細末煉蜜為丸梧子大每食後滾白湯下百丸肺痿肺癰夫痿之與癰固皆肺病然溯所由則有異矣何也痿則火鬱氣虛而肺燥癰則火迫血熱而肺潰二者較若蒼素治寧得無異乎蓋肺體清虛本燥主乎氣金氣清肅則一呼一吸之間臟腑經絡四體百骸無往不之而其動靜之為靡不藉以司用今也火鬱邪壅致金體燥烈肺氣虛微而敷運停息亦自衰弱不能充盈百脈乃使筋骨痿軃由是而痿病作焉故經曰肺傷善痿然金體既傷葉亦焦枯而其息亦不利息既不利則火邪無從而泄郁遏蒸熏致咯唾咳嗽血滲妄行必雲門中府隱痛咳而喉腥脈數而虛以此為驗乃曰肺痿症與癆瘵倣佛治當君以養氣佐以清金而兼攻痰之法則善矣至於肺癰由則不然或始於風寒襲肺不即消散致金氣壅遏而復飲酒若火添油火迫血聚灼而為癰或素酗酒恣欲致水虧火熾金傷熱迫血聚結而為癰種種之因又當晰辨證必咳而煩滿心胸甲錯口啖生豆不腥脈數而實以此為諦故曰肺癰始則咳血漬久則腐化為膿脈訣云瘡浮酒灌穿正此謂也法當君以排膿涼血佐以保肺清金吳氏所謂肺癰當涼其血肺痿當養其血蓋亦得其旨矣肺痿主方治肺痿久咳咯吐膿血寒熱自汗脈來弦長緊實有力者知母去毛蜜炒一錢清金益肺降火滋陰久咳肺痿黃芩蜜炒一錢主肺痿咳嗽膿血喉腥麥門冬一錢清肺治咳唾膿血天門冬去心一錢保肺氣不被熱擾定喘促而令氣清沙參一錢清熱治久肺痿五味子二十粒益水斂肺清金火嗽必用之藥阿膠蛤粉炒成珠一錢止肺痿唾血桔梗一錢清氣利咽喉為肺部引經藥也甘草五分治肺痿膿血防己一錢治肺痿膿血茯苓去皮一錢消痰淡竹茹一團清金止煩消痰解熱王瓜子炒一錢清肺熱消膿血栝蔞仁炒一錢潤化痰止咳上十四味作一劑水煎服臨服入竹瀝童便又主方治陰虛久咳肺痿膿血骨蒸盜汗夢遺等證脈來芤而虛大或濡緩有力者宜此主之人參高麗者五分消痰治肺痿久咳咯血天門冬去心一錢治肺痿咳涎不渴款冬花八分勞嗽痿麥門冬去心一錢清肺止咳五味子二十粒清金益腎斂肺栝蔞仁炒一錢治風痰沙參一錢清熱治痿蛤蚧一錢治勞嗽肺痿膿血傳尸骨蒸阿膠炒一錢補肺氣止咳嗽消膿血知母蜜炒一錢貝母消痰止咳治肺痿一錢黃明膠炒一錢補肺氣止咳嗽消膿血黃芩蜜炒一錢肺痿咳嗽熱甘草五分治肺痿吐膿血上十四味作一劑水煎食後服肺癰主方治肺癰咳嗽膿血咽乾便淋咳而煩滿心胸甲錯食生豆不腥者宜此主之桔梗二錢排膿養血補內漏葦莖即荻梗二錢治肺癰咳嗽煩滿膿血臭穢薏苡仁二錢治癰膿血橘葉五片治肺癰吐膿血柘黃一錢治肺癰夜合樹皮一錢治肺癰吐濁水蛤蚧炒一錢排膿血甘草五分痿癰並宜冷麥門冬二錢清肺熱止咳嗽去心天門冬二錢去皮心止咳清肺熱紫菀茸一錢止喘悸療咳唾膿血升麻五分消熱腫解熱毒發散瘡痍貝母一錢止咳嗽治肺癰清膿血天花粉一錢止渴生津清肺咳上十四味皆治肺癰之專品作一劑水煎食後服若日久膿血吐多不愈者屬血虛加熟地當歸阿膠久咳不愈加五味子附諸方知母茯苓湯治肺痿咳嗽氣喘不已往來寒熱自汗知母去毛蜜炒一錢茯苓去皮一錢五味子二十粒人參五分柴胡一錢甘草五分薄荷一錢阿膠炒珠一錢桔梗一錢黃芩蜜炒一錢麥門冬去心一錢款冬花八分原有白朮半夏川芎今摘之上十二味姜引水煎服人參養肺湯治肺痿咳嗽多痰有血午後潮熱聲嘶人參五分阿膠炒一錢貝母一錢杏仁去皮八分桔梗一錢茯苓去皮一錢桑白皮蜜炒一錢枳實土炒八分甘草五分柴胡一錢五味子二十粒上十一味作一劑薑棗引水煎食後服人參平肺散治心火克肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈滿咽嗌不利人參五分青皮一錢茯苓一錢天門冬去心皮一錢陳皮去白一錢地骨皮一錢甘草五分五味子二十粒知母去毛蜜炒一錢桑白皮蜜炒一錢上十味姜引水煎食遠服桔梗湯治肺癰咳嗽膿血咽乾多渴大便難小便赤澀桔梗一錢貝母二錢薏苡仁二錢桑白皮蜜炒一錢當歸一錢枳殼土炒一錢栝蔞仁炒一錢防己一錢黃耆蜜炒一錢甘草五分杏仁去皮尖八分百合一錢上十二味姜引水煎食後服附諸捷方肺痿吐血咳嗽用雞蘇末之米飲服肺痿咯血防己葶藶末之糯米湯服久嗽肺痿寒熱煩悶多唾甘草末童便調服骨蒸肺痿不能食蘆根麥門冬地骨皮茯苓橘皮姜煎服肺痿吐涎沫頭眩小便數而不咳肺中冷也甘草乾薑煎服肺痿吐血黃瓜子炒研服老少肺痿咳臭膿竹瀝日服三五次肺痿氣急寒熱面赤甘草末童便調服肺痿氣虛人參末雞子清調服能消痰益肺肺痿咳涎不渴天門冬搗汁入酉台酒紫菀末丸服肺痿咳血栝蔞仁烏梅杏仁末之豬肺煮蘸食之勞嗽肺痿款冬花百合末服之胸滿振寒咽乾吐濁唾久久吐膿血桔梗甘草末服吐盡膿血愈肺痿咳嗽煩滿心中甲錯葦莖杏仁瓜瓣薏苡煎服吐膿血愈肺癰咳膿血薏苡仁水煎入酒醋煮服當吐血出肺癰用橘葉搗汁一盞服吐出膿血愈肺癰不問已成未成以柘黃一兩百草霜二錢糊丸米飲服十丸甚捷肺癰唾濁膿夜合皮水煎服附宜食諸物羊肺久咳肺痿同杏仁柿霜豆粉真酥白蜜灸食羊脂髓肺痿骨蒸同生地汁生薑汁白蜜煉服豬肺肺痿膿血煮熟蘸薏苡末食鯽魚肺痿咳血同羊肉萊蔔煮食豬𦚠和棗浸酒服鹿血酒服火病寒熱夫寒熱者謂惡寒發熱或倏寒而倏熱也有外感內傷火鬱虛勞瘧疾瘡瘍瘰癧諸證若外感風寒者以邪氣在表法當散之半表者和解之火鬱者則發之瘧病寒熱者初則解之久則截之瘡瘍瘰癧寒熱者以外科法治之惟虛勞內傷時寒時熱者非陽虛則陰弱也陽氣虛則陰往從之以陰乘陽分故惡寒也陰氣虛則陽必乘之以陽乘陰分故發熱也此陰陽自相戕賊為病亦非邪之所為雖有寒熱無乃陰虛陽弱所發之標惟治其本則標自滅矣若欲妄治以溫勝寒則陰火有妨以寒攻熱則脾胃愈弱虛虛實實咎將誰歸凡內傷寒熱本屬虛象難可主方惟考切於寒熱之品贅之以俟同志者採用焉和解之品甘草炙主五臟六腑寒熱邪氣凡虛而寒熱者倍之知母蜜炒腎勞憎寒煩熱便溏胃弱者忌之丹參虛勞寒熱黃芩蜜炒寒熱往來及骨蒸勞熱秦艽當歸白芍川芎並主虛勞寒熱龜甲骨中寒熱肌體寒熱欲死作湯良補中清熱之品黃耆蜜炒虛勞寒熱沙參白朮土炒並主寒熱益氣和中桔梗除寒熱利肺氣麥門冬去心天門冬去心皮山藥並治肺虛寒熱茯苓去皮酸棗仁微炒研山茱萸並治心虛寒熱痰火潮熱夫潮熱無時為外感潮熱有時為內傷蓋內傷發熱是陽氣自傷不能升達降下陰分而為內熱乃陽虛也故其脈大而無力屬脾肺二經病陰虛發熱是陰血自傷不能制火以致陽氣升騰乃陽旺也故其脈數而無力屬心腎二經病總之不過七情色欲飲食所傷而陰虛火動故也治宜養血健脾以治其本降火清心以治其標若妄用銀柴胡胡黃連之類以消其肌肉而死者必矣誠可哀哉愚謂痰火之熱作於子午而不爽其期者蓋火病至於發熱則相火四起天君失令必有夢遺盜汗骨蒸等症其心火一動則移熱於小腸小腸乃丙火之腑丙火旺在午小腸系絡於腎腎虛則便濁乃小腸火動故宜午後作熱也至子而退者蓋丙火絶在子心經之火至此時而退令患痰火者多在二十以內少年之士血氣雖虧而日間飲食尤易生津液津液乃注於膀胱者也膀胱號為水曹壬水又旺在子水旺則火自滅而熱宜至此時而退矣明醫於此瀉小腸之火清心經之熱補腎之水兼生膀胱津液加以患者善於保養即重病可痊苟醫家不諳生旺經絡妄投退熱之劑患者不愛性命如前消耗真精即以日間飲食所生津液猶以杯水而救車薪之火也熱將日盛病將日增即再世岐黃亦難救矣是可哀也潮熱主方治陰虛症發於子午後其脈浮細而數大當歸取身潤者五分酒洗養血滋陰補腎除熱大川芎取重白者五分養新生血療勞損調陰虛潮熱熟地黃取懷慶者六分治陰虛潮熱相火熾強杭白芍紙包煨過七分補勞退熱除煩安脾調榮衛生新血瀉肝火鮮知母去毛童便炒七分止嗽而骨蒸退清金降火有功厚黃柏去皮童便炒七分瀉腎火又滋陰降火清熱有功地骨皮去骨水洗七分地為陰骨為里皮為表清血分之火退陰分之熱又治有汗骨蒸又止渴牡丹皮取香白者去骨七分瀉陰中火療無汗骨蒸神心腎治神志不足療瘀而在腸胃不散上八味一劑燈心為引半空心服如內傷色欲陰虛發熱便硬能食者去地皮丹皮加前胡貝母杏仁如房勞思慮傷腎陰虛口中有味夜熱晝輕去地皮丹皮加黃芩童便龜板附諸方清陽降火湯治男婦咳血子午二潮脈沉數山梔仁八分童便炒知母一錢乳蒸黃柏八分鹽水蒸青皮去穰八分橘紅五分丹參九分麥門冬去心四分沙參一錢童便炒茜根九分姜一片茅根一撮水煎空心服滋陰降火湯治男婦痰中帶血五心潮熱午後陰虛火動脈浮而數知母乳蒸一錢黃柏童便蒸九分甘草三分黃芩酒蒸四分麥門冬去心四分龍膽草童便蒸四分白馬骨頭用酥油三分炙至一錢黑玄參四分丹參一錢姜一片茅根一撮水煎對童便空心服朱雀丹治男婦腰背痛午後發熱自汗脈洪浮沙參童便浸曬乾梔子仁童便蒸知母乳蒸天門冬去心黃柏童便蒸何首烏乳蒸以上各一錢甘草三分姜一片上水煎空心服逍遙散治婦人血虛煩熱月水不調痰嗽潮熱有汗俱宜當歸酒洗白芍酒洗白朮土炒白茯苓以上各一錢柴胡七分甘草炙五分上六味用煨姜一片薄荷少許同煎服若潮熱兼咳者加桑皮知母貝母桔梗麥門冬若潮熱兼咳血者加生地炒梔子牡丹皮若潮熱兼嘔吐者加陳皮半夏若潮熱兼嘈雜加姜炒黃連茯苓補心湯治婦人虛勞咳嗽無汗當歸酒洗七分川芎七分白芍火煨七分熟地黃忌鐵七分陳皮去白七分白苓枳殼七分桔梗七分全胡七分乾葛七分人參五分半夏滾水泡過紫蘇七分木香五分甘草三分上十五味薑棗煎服附捷方虛勞客熱枸杞根為末白湯調服有痼疾者勿服虛勞發熱柴胡人參各三錢薑棗同水煎服陰虛發熱麥門冬竹茹燈心時常煎服子午潮熱黃柏知母地骨皮麥門冬燈心竹茹木通北五味等分制過煎服附拙見治驗一人痰火作熱煩躁不安此氣隨火升也余用滋陰降火湯加酸棗仁炒山梔黃連竹茹童便同煎數服而愈痰火骨蒸夫骨蒸者病人自覺骨髓中蒸熱捫之皮膚肌肉則無熱也以其火伏於水燔爍真陰煎熬骨髓是以有此酷證焉然病固火之所為而其治亦不可直折惟滋陰抑陽以水勝火如四物知柏玄參地骨丹皮之屬從治可也若以苦寒正治以傷其脾則肌肉日消黃泉之境路豈賒乎哀哉聖謂火病骨蒸真陰虧之極矣以水伏火中熱侵骨髓是根本傷而干及枝葉矣何長茂而不槁乎夫水之與火相背而不相得者也以水沃其火則滅火爍其水則枯然以火置水中反熾者非龍雷之火乎所謂龍雷者謂其不可水伏不可直折如龍潛大海火光竟起得水益燔雷震虛空煙焰並熾以陰愈顯法惟參耆知柏玄參等味之苦甘溫從治庶幾可遏以溫能除大熱之義也若以芩連之苦寒正治則陰火愈熾而脾土益虧所謂穀神既去何藉以生噫病至此而不遇良工若牽牛已至屠肆將自就死地其得生者幾希人可不知哉骨蒸主方治骨蒸勞熱虛羸瘦悴自汗盜汗咳嗽諸血等證脈來浮而芤濡虛大弱細無力者宜此主之人參高麗者一錢補陽生陰黃耆蜜炒一錢瀉陰火溫能除大熱之味甘草炙五分主骨蒸勞熱自汗知母去毛蜜炒一錢忌鐵主骨蒸盜汗秦艽去蘆一錢主傳尸骨蒸玄參忌鐵治傳尸邪氣骨蒸地骨皮一錢治骨蒸煩熱酸棗仁鹽炒一錢治骨蒸勞熱鱉甲醋炒一錢治瘦骨間勞熱實補氣補陰烏梅三個治虛勞骨蒸牡丹皮去骨一錢上十二味前證之專品證若參差又復如證增損不可拘泥作一劑水煎熟時入童便一盅和服若自汗多者入浮小麥一撮若素有傳尸者入青蒿煎同服若脈證不受補者減參耆加歸芍生地二冬咳嗽加貝母栝蔞北五味若骨蒸熱甚而渴者加火煨石膏一錢牡丹皮手厥陰足少陰經藥故治無汗之骨蒸地骨皮足少陰手少陽藥故治有汗之骨蒸附諸方經驗五蒸飲治骨蒸熱神效茯苓潔白者去皮八分葛根五分竹葉五分水洗人參清河者佳五分童便浸過生黃砂仁拌蒸一錢知母童便炒八分黃芩酒炒一錢石膏火煨七分用粳米二合以水三盅煎小麥二合至二盅去麥以麥湯藥至一盅溫服隨證加減於後忌海藻松菜蕪荑米醋如實熱加黃芩黃連黃柏大黃之類如虛熱氣虛加烏梅秦艽柴胡如血虛加青蒿鱉甲蛤蚧小麥牡丹皮如髓蒸髓枯骨中熱加生地黃當歸天門冬如骨蒸齒黑手足逆冷疳食五臟加鱉甲地骨皮生地黃當歸牡丹皮如臀蒸肢細趺踵腑臟皆熱加石膏黃柏如胞蒸小便赤黃加澤瀉茯苓生地黃沉香滑石凡此諸證皆熱病後食肥甘油膩房事飲酒犯之而成久蒸成疳死期迫矣滋陰至寶湯治婦人骨蒸潮熱或喘嗽盜汗或泄瀉腹痛體疼或煩渴肢瘦當歸酒洗八分白朮土炒八分白芍火煨八分白苓乳蒸八分陳皮八分知母蜜水炒八分貝母去心七分香附童便炒七分地骨皮去骨八分薄荷五分麥門冬去心八分柴胡酒炒五分甘草三分煨姜三片同煎附捷方急勞發熱身體痠痛用秦艽柴胡各一兩甘草五錢為末每五錢白湯下虛損骨蒸用天靈蓋如梳大炙黃以水五升煮取二升分三服起死回生也骨蒸咳嗽多睡勞乏嘔逆痰壅以苦耽即燈籠草搗煮服之骨蒸煩熱及一切虛勞煩熱並用地仙散地骨皮二兩防風一兩甘草半兩每用五錢生薑五片水煎服虛勞苦渴骨節煩熱或寒熱用枸杞根白皮切五升麥門冬一升水二斗小麥二升熬至麥熟去渣每服一升口渴即飲骨蒸發熱雄黃末一兩入童便一升研如乳乃取黃理石一板方圓一尺者炭火燒至三食頃濃淋汁石上置薄氈於上患者脫衣坐之衣被圍住勿令泄氣三五度瘥骨蒸勞病外寒內熱附骨而蒸也其根在五腑六臟之中必因患後得之飲食無味或皮燥無光蒸盛之時四肢漸細足趺腫起石膏十斤研如乳粉每水服方寸匕日再以身涼為度小兒骨蒸體瘦心煩天靈蓋酥炙黃連等分研末每服半錢米湯下附拙見治驗一太學之子年十六歲患骨蒸勞熱召余診視六脈微數乃陰虛火動也余用滋陰降火湯加地骨皮柴胡水煎童便同服數劑熱略退後每劑加炒黑乾薑三分全愈附虛勞骨蒸宜食諸品鰻鱺魚治傳尸疰氣勞損骨蒸勞瘦宜以酒煮食之鱉肉益氣補不足若骨蒸潮熱咳嗽宜前胡貝母等藥丸服慈烏補勞治損止咳嗽骨蒸以五味子醃食之啄木鳥治骨蒸取蟲研末酒服之烏鴉治痰病咳嗽骨蒸勞疾煨研酒服之又治五勞七傷吐血咳嗽釀栝蔞根煮酒日服豬肚治骨蒸熱熱時宜服豬脊髓治骨蒸勞傷或同豬膽柴胡童便煎服豬肝急勞瘦悴寒熱或同甘草丸服豬腎治勞瘵或同童便煮食豬膽治骨蒸勞極羊肉骨蒸久冷同山藥作粥食傳尸同皂角酒煮食當蟲出獺肝傳尸伏連燎殜勞瘵虛汗咳嗽發熱殺蟲陰乾末服之人尿滋陰降火男女勞症服二次骨蒸發熱以五升煎一升入蜜二匙每服一碗日二服人乳補五臟治瘦悴虛損勞瘵或同麝香木香服或同胞衣服火病失音夫失聲之證非一有痰壅邪郁肺痿毒風寒熱狐惑舌強不語腎虛喑痱治法各從其類也惟痰火聲嘶則與諸證大異何也以水涸火炎熏燥肺竅金為火爍而損由是而聲嘎聲嘶見焉治法非苦寒降火溫燥消痰可復惟益水清金則善矣愚謂言者心之聲聲者肺之韻肺體清虛以氣鼓之迫之則鳴猶鐘磬之懸架其內空虛擊之則鳴內有汙濁壅窒擊之則聲啞而不明也若自邪郁痰壅肺痿狐惑等因則其聲啞嘎惟去其痰邪等病即猶去鐘磬之泥土濁垢擊之自鳴復何啞乎若夫水虧火炎金傷聲碎者則猶鐘磬擊損欲其如故須復鑄之所以痰火聲嘶其得全愈者鮮矣即施益水清金之法尤恐不逮若更以苦寒妄治虛虛之禍豈不旋踵而至哉利聲諸品桔梗除肺熱利咽喉沙參補肺氣瀉肺熱益肺腎麥門冬清金益腎利咽喉復聲音知母滋水清金木通清心通竅利聲音人參除肺熱利聲音石菖蒲通心竅發聲音訶黎勒治久咳失音又同木通服尤驗人乳竹瀝薑汁童便四味相合頓溫服並治久咳失音柿潤喉聲槐花炒嚼去風熱失音者附諸方清音散治失音聲啞訶子三錢半生半熟木通三錢半生半泡熟桔梗三錢半生半熟甘草三錢半生半熟用生地黃搗爛入藥服熟藥內加童便三五匙更效鐵笛丸治失音或不清當歸一兩酒洗生地黃一兩砂仁拌蒸天門冬五錢鹽炒黃柏一兩炙麥門冬一兩去心鹽炒知母五錢去毛蜜水炒白茯苓去皮一兩訶子五錢阿膠五錢麵炒烏梅十五個牛乳一碗梨汁一碗人參三錢清河者佳用童便浸去參毒共為末煉蜜丸如黃豆大每服八丸訶子湯下或蘿白湯下附名醫治驗內侍曹都使新造一宅遷入半月飲酒大醉臥地失音不能語召孫至診之曰因新宅故得此病耳半月當愈但服補心山藥丸治濕用細辛川芎月餘全安曹見上問誰醫曰孫兆郎中乃召孫問曰曹何病也對曰凡新宅壁土皆濕地亦陰多人乍來陰氣未散心氣素虛醉後毛竅皆開陰濕之氣入而乘心故不能語臣以山藥丸使心氣壯盛後以川芎細辛去濕所以能語也一人患火病聲啞醫皆云不治之症余診右部脈洪而有力自得咽未痛詢前所服皆寒涼劑也遂以天冬麥冬沙參陳皮貝母玄參天花粉薄荷桔梗甘草細辛少許海粉竹茹數十劑而愈聲如故間以蜜拌九曬陳槐花令每睡時細嚼一片隨津液咽下甚妙火病咽痛並附口舌生瘡夫咽之所以咽物喉之所以候氣雖居上焦陽分然有太陰少陰之脈絡焉人之一身水升火降無壅無滯則咽自利而喉自潤也若夫土衰水涸則相火蒸炎致津液枯竭由是而咽喉乾燥疼痛等證作矣火病至此實真陰失守孤陽無根沖浮於上而乃至此痰火諸證孰酷此耶所謂龍雷之火不可水伏惟滋陰抑陽使水升火降津液復回而後可止若以苦寒正治則陰火愈熾而脾土自敗猶渴飲鴆立促其斃也聖謂咽喉諸症有虛有實若上焦風熱君火令人咽喉腫痛或喉痹乳蛾分屬關隘愴卒即能殺人然皆失治所致即至危際外可施砭焠拔髮咬指吐痰㗜鼻等捷法以治其標內服翹射山豆根牛蒡子根鼠黏子等味以拔其本至絶地挽回者亦多若夫痰火咽痛則必諸症悉具甚乃有此何也以臟敗下及脈絡是根枯而槁及枝葉矣可復榮乎此蓋陰火浮游進退莫測所以或痛或止故非苦寒之可遏也治亦不宜專攻但以主劑中倍以益陰之品少增暢利之味庶幾得法若以苦寒直折則陰火愈炎立見傾危也慎之慎之利咽良品甘草蜜炙緩火去咽痛若肺熱同桔梗煎啜知母蜜炒瀉肺火利咽痛玄參去無根之火滋腎水利咽痛麥門冬去心治虛熱上攻咽痛以上五味皆痰火咽痛兩利之品其山豆根牛蒡子根惡實子射干皆苦寒專攻之劑並所不宜或以貝母百合訶子槐花煎之噙咽或貝母硼砂末之吹咽治標可也附諸方甘梗湯治喉痛並聲音不出桔梗二兩去頭甘草一兩略煨荊芥五錢去梗取穗每服四錢生薑三片引海上方治喉生瘡聲啞白硼砂一錢孩兒茶一錢蒲黃六分青黛一錢牙硝六分枯礬六分片腦二釐黃連五分滑石一錢黃柏五分寒水石一錢共為末以葦筒吹末入喉立效大溫丸治口舌生瘡服諸涼藥不效者大附子童便煮一炷香人參去蘆三分桔梗一錢去頭生地黃一錢蛤粉五分玄參七分升麻四分上七味共為細末煉蜜為丸金箔為衣薄荷湯下神效附捷方喉痹語音不出用李實根皮一片噙口更李根皮水搽項一周候喉痛用倒滴刺根淨汁入些好酒同研滴入喉中痛立止又方用豬牙皂為末和霜梅噙之又方用茜草根一兩作一服能降血中之火中氣咽閉急用白殭蠶搗篩為末生薑自然汁調下喉立愈殭蠶屬火而有土與木老得金氣而僵治喉取其火中清化之氣以從治散結滯之痰喉痹取蠐螬蟲汁點在喉中下咽即開咽腫用土牛膝搗自然汁和醋服本草云土牛膝主血結及血塊急喉痹其聲如劓痰在喉響此為肺絶之候急煎獨參湯救之服早者十全七八次則十全四五遲則十不全一也咽喉痛用諸藥不效者此非咽痛乃是鼻中生一條紅線如發懸一黑泡大如纓珠垂掛到咽門而止口中飲食不入須用牛膝直根而獨條者洗淨入好醋三五滴咽入則絲斷珠破其病立安喉風牙關緊閉用焰硝一錢五分硼砂五分腦子二釐半白殭蠶二釐共為末以竹管吹五分入喉立愈附名醫治驗押班都知潘元從喉閉急召孫至於夾袋中取藥末吹喉中少頃潘吐出膿血立愈潘因贈金一百願求方以濟非常之急孫以其授之用豬牙皂白礬黃連等分新瓦上焙乾為末用一錢因曰神方無價安用以利易哉遂不受所贈文潞公一日喉腫因三日愈甚上召孫治之孫曰病得相公判筆一管治用筆尖點藥入喉孫遂藏針於筆尖隨手便刺相公昏僕左右驚愕孫曰非我不能救相公之急須臾吐出膿血升余旬日平復見上喜曰孫真良醫也由是觀之喉痹以惡血不散故也凡治此疾暴者必先發散發散不愈次取痰取痰不愈次去汙血也楊立之知廣州一日喉痛潰爛飲食不進命吏召吉老診之曰不必服藥但食生薑一片方可救也其子有難色以喉痛安能復食辛辣立之曰吉老神醫但食不妨遂取一片食之覺香味異常漸食加至半斤余喉腫頓消飲食如故召吉老而謝之問病所以吉老曰相公平日多食鷓鴣肉此物喜食半夏苗蓋中其毒也惟姜可解故爾獲效之捷火病泄瀉泄瀉之證有五脾胃大腸小腸大瘕是也然溯其源大概脾病濕漬所致約其治無乃健脾滲濕為先若夫痰火病此則屬脾腎兩虛何也蓋腎衰不能攝脾弱不能運脾氣虛則闌門之氣亦虛是以不能泌別清濁致水液渣滓混入大腸故或溏而或泄也法當君以實土臣以益水佐以清金使以兜澀所謂實土土者白朮白芍山藥是也所謂益水者故紙五味是也所謂清金者五味二冬沙參是也所謂兜澀者訶子肉蔻蓮肉芡實是也蓋腎氣實則自能攝脾氣實則自能運金氣清肅自能施化矣雖有外寒內熱飲食積滯但宜解散消導不可妄攻蓋攻邪則妨正恐觸滑滑之熱即未易遏愚謂泄瀉一症為亡陰脫液之肇端痰火病此猶敗葉經霜鮮不凋墜何也以陰虛故動火而復以亡其陰則清陽之氣益陷相火之焰益炎下而窘迫上而咽痛諸證蜂起矣當此之際欲實土則妨肺欲清金則礙脾醫者能不掣其肘乎姑以敦土清金之品末之為丸徐徐緩服此無伐天和之意班固曰有病不醫得中工正此謂耳泄瀉主方治痰火諸症悉具倏而大便或溏或泄此脾腎之氣兩虛不能統攝運行或由飲食內傷風寒外襲衝動其勢宜以此方主之山藥微炒一錢人參高麗者五分黃耆蜜炒一錢白朮土炒一錢白茯苓去皮一錢陳皮留白八分熟地黃一錢白芍煨一錢甘草炙五分五味子二十粒貝母一錢麥門冬去心一錢上十二味生薑三片大棗五枚濃煎趁熱徐徐緩服不宜驟下若果傷穀食但加炒麥芽少許以消導之然麥芽亦能軟便不可過多若傷肉食少加山楂若傷麵食少加神麯若因風寒直犯太陰腹痛泄瀉本劑減地黃麥門冬加炒乾姜一二分熱服外用炒鹽帛裹尉之更宜少飲湯水凡痰火之證最宜便實一見便溏即當警省用藥亦須提防如本劑有知母味苦性寒潤下沉降便軟便溏者宜去之不得已而用者亦須薑汁熟炒當歸味雖甘溫然亦潤下利便用須減半生熟地黃性寒滯泥亦須薑汁蒸過天門冬性味苦寒潤利便溏者亦須去之其梔連芩柏並屬苦寒脾腎虛者大所忌也按魏氏曰凡泄瀉宜用丸藥蓋土惡濕而喜燥即用湯劑亦須濃煎少服蓋湯者蕩也脾虛者所忌以服下即行不能久駐胃中故爾附諸方泄瀉丸治火病便溏或瀉或下迫窘痛或脾泄腎泄並可主之白朮土炒四兩橘紅留白二兩白芍煨二兩白茯苓去皮二兩蓮肉去皮心二兩芡實取生肉二兩腹痛後重加木香二錢久瀉加肉蔻麵裹煨熟去油五錢訶子麵煨取肉五錢若每清晨溏瀉一二次名腎瀉加破故紙炒五錢若食不消化加麥芽炒取末五錢無上諸症者不用上俱為細末用淮山藥六兩另末以荷葉煮水為糊丸如梧子大每百丸或五七十丸食遠或清晨清米湯滾白湯俱可下二神丸治清晨溏瀉一二次名腎泄或久泄脈沉無力破故紙炒肉豆蔻麵煨去油各一兩末之棗肉丸如梧子大每二三十丸臨臥淡鹽湯下或空心米飲下當歸厚朴湯治肝經受寒面色青慘臥而泄利當歸酒洗二兩厚朴制過二兩官桂二兩良薑三兩上每三錢水煎食前服家蓮散治泄瀉經久不止蓮肉水泡去皮心微火焙乾四兩川厚朴去皮薑汁浸炒一兩乾薑炒黑色一兩上三味為末每服米飲調下二三匙日三服養元散治久泄飲食少進糯米一升水浸一宿濾干慢火炒令極熟為細末入淮山藥芡實肉蓮肉各三兩胡椒末一錢和勻每日清晨用半盞再入砂糖二匙滾湯調服訶子散治久泄腹痛訶子一兩半生半面裹煨木香五錢甘草二錢黃連三錢上四味為末每服二錢以白朮白芍湯調下如泄止痛不已加厚朴一兩泄其邪氣也海上奇方治脾泄即經年者無不愈用半大腳魚數枚煮半熟擇出淨肉炭火上焙乾為末如腳魚肉末二升用黏糯米粉各半共約一升合勻用不油白朮一兩肉豆蔻麵裹煨熟一兩為末與米粉三升二味各用三兩同為末醋糊為丸每空心米湯下七十丸神效附捷方五更溏泄用五味子二兩吳茱萸五錢二味炒香為末每陳米湯下三錢水泄用神麯炒香六兩茴香五錢生薑三兩為末米糊丸每服五七十丸痰積泄瀉用海石青黛黃芩薑汁炒神麯乾炒為丸每服三五十丸暴水泄不止用肉豆蔻三個麵裹煨熟為細末只作一服食前陳米湯下脾胃中風溫滑瀉用川芎神麯炒白朮附子泡各等分上為末曲糊丸米湯下附名醫治驗一人之水穀不化腹作雷鳴自五月至六月不愈諸醫以並聖散子豆蔻丸雖止一二日藥力盡復作戴至而笑曰經云春傷於風夏必飧泄有水穀直過而不化又云水穀不化熱氣在下久風入中中者脾胃也風屬甲乙脾屬戊己甲乙雖克戊腸中有風故鳴經曰歲木太過風氣流行脾土受邪民病飧泄診兩手脈皆浮數為病在表也可汗直斷曰風隨汗出以火二盆暗置床下不令病人見詒之入室更服麻黃湧劑乃閉其戶從外鎖之汗出如洗待一時開戶減火須臾而汗止泄亦止風非汗不出故宜汗之而愈若脾虛泄瀉又不可以此類而論也傳尸鬼疰夫病曰尸疰者以其身為蟲所蛀蟲蛀其尸有蟊賊蝕物之害是故名焉然症與癆瘵倣佛惟遞相傳染纍世不絶有伏連殗殜等名總曰傳尸病也溯所自來蓋有一種鬼疰尸氣伏於人身使人精氣血液日耗漸致陽盛陰虧煎熬熏爍血液結摶漸而變為怪異之蟲日蝕月蛀臟腑消潰蝕盡氣絶則死乾坤生意已消磨盡矣謂初世之蟲形若人發馬尾再世則小者若蛔大者若蛇至於九世則類人類鬼其狀不一令人可驚始於薰陶漸染旋踵至極一死即一病甚至滅門絶戶者有之自古惟葛氏之法最奇但以世久湮其證論獨存數方而已觀所立諸方皆主參耆者蓋有真知實見以正勝邪猶良農治畦滋之以糞五穀濃盛則稊稗自滅矣今觀者不知作者之意遂棄而勿用何也彼以參耆為峻補以蒿甲為峻攻殊無定見三思反惑或以歸地補陰或以芩連降火陰藉陽生之法昧而不求懵然無悟若此之劑陰何以生蟲何以殺徒潰其腸腹而已更何益耶由此之際醫與病家鮮不袖觀鼠首倣手傍徨以俟天年者良可悼哉愚謂是症之法但與癆瘵少異必君以殺蟲臣以養正佐以益水清金使以滋陰抑陽則善矣越於是法豈其然乎凡素有病此之家則人人自當驚惕毋酗酒毋恣欲毋偏七情謹禁六淫保護元氣所謂本固則邦寧邪何以入其所以染者皆不知持滿以酒為漿以妄為常以欲喪其真邪乘虛入而後乃然經曰邪之所湊其氣必虛正此謂耳要之病既著體則當以死為念兢兢業業絶諸欲薄厚味諸法亦當早施庶不貽禍倘不守其戒不珍其命逮至傳遞諸臟則真敗邪勝即葛君之神復何濟耶傳尸疰病主方治傳尸骨蒸伏連殗殜一切癆瘵疰病人參取高麗上者五分黃耆蜜炙一錢並主傳尸骨蒸勞熱自汗玄參忌鐵一錢主傳尸邪氣常作香燒亦好苦耽即燈龍草生二錢主傳尸伏連鬼氣鬼臼三錢主尸疰殗殜傳尸癆瘵知母忌鐵蜜炒一錢主傳尸骨蒸秦艽去蘆一錢主骨蒸潮熱虛勞寒熱胡黃連五分主骨蒸潮熱五心煩熱婦人胎蒸小兒童勞潮熱烏梅取肉五個治虛勞骨蒸地骨皮一錢主骨蒸煩熱防風甘草煎服酸棗仁微炒一錢主骨蒸勞熱心驚自汗多眠不眠甘草五分補五勞七傷一切虛損通九竅益精養血生用瀉火熱熱用散表寒青蒿熬膏入藥用主骨蒸鬼氣或煎膏入豬膽甘草末丸服天門冬去心皮一錢保肺氣去寒熱養肌膚和肺氣定喘促麥門冬去心一錢主五勞七傷安魂定魄止咳定喘去肺中伏火補心氣不足諸血妄行虛勞多熱口乾燥渴百部去苗一錢主傳尸骨蒸勞熱上氣止咳紫菀茸一錢主咳唾膿血喘悸五勞體虛勞氣尸疰虛熱百邪鬼魅桔梗去蘆一錢清肺利咽喉浮小麥一撮主傳尸骨蒸及勞熱自汗蛤蚧炙一錢治肺勞傳尸咳嗽咯血鱉甲酥炙一錢治冷痛勞嗽除骨節間勞熱結實補陰補氣上二十一味皆上證之要品作一劑水煎空心服而其加減之法亦從前之火病治例附諸方天靈蓋追取勞蟲天靈二指大以檀香煎湯洗過酥炙一氣咒七遍云雷公神電母聖逢轉尸便須足急急如律令尖檳榔五枚阿魏二分麝香三分辰砂一分安息香三分甘遂三分為末每服三錢用童便四升入銀石器內用蔥白薤白各二七莖青蒿二握桃枝甘草各二莖五寸長者柳枝桑枝酸榴枝各二莖七寸長同煎至二升分作二次五更初調服前藥一服蟲不下約人行十里又進一服天明再進取下蟲物名狀不一急鉗入油鐺煎之其蟲嘴青赤黃色可治黑白難治然亦可斷傳染之患凡修合先須齊戒於遠房淨室勿令病人聞藥氣及雞犬貓畜孝子婦人一切觸穢之物見之蟲下後以白粥補之數日之後夢人哭泣相別是其驗也又方治虛損骨蒸天靈蓋如梳大炙黃以水五升煮取二兩分三服起死神方也張文仲備急方用人腦骨炙三兩麝香十兩為末搗干杵丸梧子大每七丸米湯下日再服若骨前有青沫出者以針刺看血色未黑者七日瘥又方治小兒骨蒸體瘦心煩天靈蓋酥炙黃連等分研末每服半錢米飲下日二服神授丸治傳尸勞症最殺癆蟲用真川椒紅色者去子及合口者以黃草裹三重隔之炒出汗取放地上以砂盆蓋定以火灰密遮四旁約一時許為細末去殼以老酒浸白糕和丸梧子大每四十丸食前鹽湯下服至一斤其疾自愈昔有一人病此遇異人授是方服至二斤吐出一蟲如蛇而安遂名神授丸明目丹治勞追蟲用兔屎四十九粒硇砂如兔屎大四十九粒為末生蜜丸如梧子大月望前水浸甘草一夜五更搗取送下即鉗入油鍋中煎殺三日不下再服又方水獺足為末酒服殺癆瘵蟲又方治癆瘵殺蟲用貓肝一具生曬研末每朔望五更調服之又方虎牙礪末服殺癆蟲附本病宜食諸物鰻鱺魚清水煮可常食之主傳尸疰氣勞損骨蒸勞瘦或酒煮食鱉肉煮食益氣補不足去血熱骨蒸潮熱咳嗽同前胡貝母等藥煮食或丸服啄木鳥取蟲炒研酒服或煮食慈烏補勞治瘦止咳嗽骨蒸以五味醃食之烏鴉主勞癭咳嗽骨蒸勞痰煨研酒服之五勞七傷吐血咳嗽釀栝蔞根日煮食之納鱉主傳尸勞瘵鷹矢白焙研末水服殺癆蟲豬脊髓主骨蒸勞傷同豬膽童便柴胡等藥煎服豬肝治急勞瘦悴寒熱同甘草丸服豬腎主傳尸癆瘵童便煮酒食豬膽主骨蒸癆極羊肉骨蒸久冷同山藥作粥食骨蒸傳尸同皂角酒煮食當吐出蟲豬肚骨蒸勞熱四時宜食白羊頭蹄五勞七傷同胡椒乾薑蓽撥煮食貓肝殺癆瘵蟲生曬研每朔望日五更酒服豬肺主傳尸伏連殗殜勞瘵虛汗咳嗽發熱殺蟲陰乾為末水服日三次鹿茸膃肭臍主虛勞熊脂酒服殺癆蟲又補虛損象牙主骨蒸獺肉貍骨虎牙鼠肉並殺癆蟲蛇吞鼁主癆嗽吐臭痰煅研末酒服附人部宜用物童便滋陰降火男女癆症日服二次骨蒸發熱以五升煮一升入蜜三匙每服一碗日二服人中白主傳尸熱勞肺痿消痰火消瘀血秋石主虛勞冷痰有製法人乳補五臟治勞悴虛損癆瘵同麝香脹或同胞衣末服人牙燒用治勞傷天靈蓋主傳尸尸疰鬼疰伏連肺癆骨蒸盜汗退邪氣追癆蟲炙黃水煎或同麝香丸服小兒骨蒸加黃連末服追蟲有天靈蓋散人胞男女一切虛損勞極洗煮入茯神丸服河車大造丸人中黃主骨蒸勞極名伏連傳尸同小便各一升入新粟米飯五升面拌餅密封七日每旦服一合午再服並去惡氣痰火諸方補遺痰火實症主方治勞傷心腎精血虧損形體羸瘦陰虛火旺咳嗽潮熱失血等證脈來弦長緊實滑數有力者皆火鬱內實不受補者也宜此主之當歸身酒洗一錢五分生地黃忌鐵一錢五分薑汁蒸白芍藥煨一錢玄參忌鐵一錢知母去毛忌鐵蜜炒一錢黃柏忌鐵蜜炒褐色一錢白茯苓去皮一錢沙參一錢五分北五味二十粒黃耆蜜炒綿軟者一錢天門冬去心皮一錢五分甘草炙八分麥門冬去心一錢上十二味皆考本草於前證所必用者但如症而增減之自可捷其驗也若潮熱甚者加柴胡一錢地骨皮一錢若肺火盛而咽燥口腥者加蜜炒枯芩一錢天花粉一錢若肺熱咳甚痰多者加炒栝蔞仁一錢貝母八分若肺燥咳血加炒阿膠珠一錢牡丹皮八分藕節三個童便一杯生薑汁五匙對服若吐血加鬱金三分藕節棕灰減黃耆若肺火鬱甚而嗽血者倍片芩生地加桔梗丹參阿膠藕汁童便對服亦減黃耆若自汗甚倍黃耆加麻黃根五分或加牡蠣粉若盜汗倍歸地加酸棗仁茯神牡蠣若衄血加紫參磨犀角片芩炒黑梔子倍生地黃若夢遺加山藥山茱萸茯神蓮鬚或加牡蠣若食少便溏加山藥土炒白朮減知母若咳而聲嘶此火鬱肺損加訶子倍天門冬倍麥冬若咳唾膿血喘嗽者加紫菀茸肺熱燥咳上氣喘急加百部痰火虛症主方治虛勞瘦損潮汗遺嗽失血諸證全具脈浮而芤濡虛大緩遲無力或沉而遲澀弱細結代無力皆虛而不足可補者當此主之人參取上品高麗者五分黃耆外白內黃綿軟者蜜炒一錢大甘草炙五分生地黃淡酒蒸忌鐵一錢熟地黃薑汁蒸一錢當歸身淡酒洗一錢白芍藥煨一錢玄參忌鐵木槌槌碎一錢北五味十五粒沙參一錢天門冬去心皮一錢麥門冬去心一錢上十二味皆詳考本草綱目及素所經驗於內傷火病最切者一味不可遺之若外有遺證必如前症之增減乃可中隙況前之增減之法未必一一括盡病情更當於後之藥性中互參之則無不中其肯綮矣按古制治癆諸方鮮有不用參耆者蓋亦得其病情之旨第今者惑於王氏之論一目而畏之如蛇蠍遂為廢典矣愚謂古人之立方也必神於監製素所經驗者乃以示人今之術庸識淺輩不能神其神而反妄議雌黃致病家亦以其言橫之胸中至死而不悟也逮以劑中諸品考之本草則無一不中病情者但於中間有一二味性稍不純有妨陰火者姑摘之如樂氏建中湯之細辛黃耆鱉甲散黃耆扶羸湯人參黃耆散蛤蚧散等劑之半夏華蓋散之白礬太平丸之麝香等味性稍峻燥彼則得而妄議之豫故摘之詳考本草云細辛固有益肝之能然以氣味辛香恐熾陰火半夏固能調和脾胃之氣亦以辛溫氣燥恐不利肺白礬固可劫痰而氣寒味且酸澀不平又屬金石之品麝香固能通竅然以氣竄恐走真氣有妨余固不敏不能為先哲之忠臣惟持一得之見而刪訂之意後者或可沾澤於萬一耳謹將諸方附後以俟後之君子而採擇焉樂氏建中湯治臟腑虛損身體瘦悴潮熱自汗將成癆瘵此藥大能退熱補虛生血養血人參五分黃耆蜜炒一錢當歸身一錢五分白芍藥一錢五分白茯苓一錢麥門冬去心一錢五分甘草炙五分陳皮去白八分前胡八分上九味作一劑水煎薑棗引食遠溫服按上方九品殊切病情方意以人參治五勞七傷虛損瘦弱以黃耆補虛勞自汗衛固腠理以當歸治虛勞寒熱逐舊生新以白芍補腎氣退勞熱制肝建脾以茯苓治勞傷滲濕治痰之本以麥門冬潤燥清金滋陰降火以陳皮行參耆之滯以益脾前胡清肺熱化痰熱推陳致新甘草補五勞七傷益精養氣養陰補胃更治咽痛是方之用九品品品精專猶孫吳之用兵不過能將十萬爾原有細辛豫摘之黃耆鱉甲散治虛勞客熱肌肉消瘦四肢煩熱心悸盜汗食少而渴咳嗽有血黃耆蜜炒一錢鱉甲醋炒一錢天門冬去心皮一錢桑白皮蜜炒八分人參五分生地黃淡酒蒸一錢五分白芍藥煨一錢知母蜜炒桔梗一錢秦艽一錢白茯苓一錢紫菀取茸一錢柴胡一錢地骨皮一錢甘草三分上十五味姜三片水煎服按上方十五味亦皆精專之品方意以黃耆治五勞羸瘦寒熱自汗補氣實表以鱉甲治勞瘦除骨節間勞熱結實補陰補氣以地骨皮治骨蒸煩熱以秦艽桔梗人參並主傳尸骨蒸勞熱自汗桑白皮去肺中水氣及火熱嗽血以天冬除肺氣清肺熱除咳痰以紫菀止咳膿血消痰益肺以生地黃治咳嗽吐血以知母瀉肺火滋腎水除命門相火以柴胡治勞熱消痰止咳以甘草瀉火養陰補脾以茯苓補五勞七傷肺痿痰壅等症以白芍利肝益脾是方也備一十五味藥品固繁而用之亦精猶韓信將兵多多益善戰有不勝者乎原有半夏肉桂余摘之秦艽扶羸湯治肺痿骨蒸已成勞咳或寒或熱聲不出體虛自汗四肢倦怠秦艽一錢鱉甲醋炒一錢人參五分當歸身一錢柴胡一錢紫菀茸八分甘草炙八分地骨皮一錢上八味作一劑用生薑五片梅棗各一枚水煎食後服按方意以秦艽治虛勞發熱傳尸骨蒸日晡潮熱以鱉甲治勞瘦骨蒸補陰補氣以人參去心肺脾胃間火邪補五勞七傷虛損痰弱以當歸治虛勞寒熱一切血虛以紫菀療咳血唾膿尸疰虛勞百邪鬼疰以甘草瀉火益脾以地骨皮退骨蒸煩熱以柴胡治勞熱骨節煩痛羸瘦補五勞七傷觀是方八味括上症無遺矣劫勞散治心腎俱虛勞嗽時復三四聲潮熱過即有盜汗四肢倦怠肌體羸瘦恍惚異夢喉中有血名肺痿白芍煨一錢黃耆蜜炙一錢人參五分當歸身一錢白茯苓去皮一錢熟地黃一錢五味子十五粒半夏曲八分阿膠炒成珠一錢甘草炙八分上十味作一劑薑棗引水煎服按方曰劫勞者以其藥力專而效之捷也方意以白芍補勞退熱除煩益氣制肝而益脾胃以黃耆補虛勞自汗益肺氣而瀉肺火以人參瀉心肺脾胃中火邪止咳唾吐衄諸血所謂血脫而益其氣也以白茯苓利竅除濕治痰之本也以熟地黃填骨髓長肌肉補五勞七傷虛羸不足也以當歸補一切血虛一切血病去舊生新也以五味子治勞傷不足暖水臟壯筋骨喘嗽燥咳壯水以鎮陽光也以阿膠補虛損止諸血補益肺臟以甘草瀉火補脾以半夏曲燥濕冷痰之標也藥固十味皆精專之品奚啻孫吳之十萬耶黃耆益損湯治男婦童子室女諸虛百損五勞七傷骨蒸潮熱腰腹俱急百節痠痛夜多盜汗心常驚悸煩躁唇焦嗜臥少力肌膚瘦瘁咳嗽多痰咯唾血絲往來寒熱頰赤神昏不思飲食服藥熱者則燥沖滿上焦涼者則胸滿而腹痛及治火病營衛不調婦人産後血氣不復並宜服之黃耆蜜炒一錢當歸身一錢人參五分石斛去梗一錢白朮土炒八分白茯苓一錢白芍煨一錢山藥一錢甘草炙八分牡丹皮八分麥門冬去心一錢五味子十五粒上十三味作一劑薑棗引水煎服按方曰益損者以諸藥益人之損多矣方意以黃耆補虛益損養氣生精健脾而潤肺也以人參補勞傷虛損益氣而生陰也以石斛治五臟虛癆羸瘦長肌肉壯筋骨消痰澀丈夫元陽也以白朮生津止渴益胃而補肝也以當歸補血去舊生新也以茯苓利竅除濕益氣和中治濕之本也以白芍散惡逐瘀平肝以助脾也以川芎治吐衄諸血為血分之氣藥也以熟地黃補血填精益腎而補真陰也以山藥補肝而益腎也以牡丹皮為和血生血涼血之品也以麥門冬止虛勞客熱心煩燥渴滋化源之要藥也以五味子滋水清金而治諸血也以甘草瀉火熱而補脾氣也是方治症固多而其藥品亦多且鋭是亦攻守並備者也原有肉桂半夏余亦去之柴前梅連散治骨蒸癆瘵不痊三服除根其效如神又治五勞七傷虛弱羸瘦發熱者宜服之柴胡去蘆二錢前胡去蘆二錢烏梅去核五枚胡黃連二錢上作一劑用豬膽一個脊髓一條韭白一錢童便二盞煎服按本草云柴胡治癆之羸瘦補五勞七傷益氣力消痰止嗽潤心肺大腸退潮熱肌熱之捷品也前胡清肺熱化痰熱推陳致新之藥也烏梅止虛勞骨蒸也胡黃連治傳尸骨蒸勞熱自汗也劫勞退熱寧過此乎蛤蚧散治虛勞咳嗽咯血潮熱盜汗不思飲食蛤蚧一對洗淨酥炙人參五錢百部去苗五錢紫菀取茸五錢貝母五錢款冬花三錢阿膠蛤粉炒五錢鱉甲醋炙五錢柴胡五錢甘草炙一錢杏仁去皮尖三錢黃耆蜜炒五錢上十二味為粗末每五錢水煎服按方意以蛤蚧治虛勞傳尸咳嗽咯血以黃耆瀉陰火而退潮熱治虛勞自汗補肺虛而瀉肺火也以人參治虛勞痰弱吐衄咯唾諸血益陽而生陰也以款冬花為溫肺治嗽之要也以紫菀止上氣咳嗽膿血消痰而益肺也以貝母治喘嗽上逆煩熱消渴止汗而安五臟也和肺引子治諸血後咳嗽多痰阿膠炒珠一錢人參五分麥門冬去心一錢山藥一錢貝母八分白茯苓一錢百合一錢杏仁去皮尖八分甘草炙八分上九味作一劑入黃蠟一塊水煎食後服按方意謂咯血後肺氣已傷用阿膠斂竅以益肺去血過多用人參補陽以生陰脾不統血故用山藥益脾以補腎嗽而多痰故用貝母清肺以消痰茯苓者所以滲濕治痰之本杏仁者所以潤燥散肺之邪而甘草者所以瀉火益脾以和中也保和湯治虛勞久嗽肺燥成痿知母去毛蜜炒一錢貝母八分天門冬去心皮一錢甘草炙五分麥門冬去心一錢款冬花八分薏苡仁一錢百合一錢阿膠珠一錢當歸身一錢紫蘇葉八分薄荷葉一錢紫菀茸一錢桔梗一錢五味子十五粒生地黃薑汁炒一錢上十六味作一劑姜引水煎服原有兜苓今摘之保真湯治諸虛百損五勞七傷骨蒸潮熱咳嗽諸汗諸血等症當歸身一錢人參五分生地黃一錢熟地黃一錢黃耆蜜炒一錢白朮土炒八分白茯苓一錢甘草炙八分陳皮去白五分白芍藥一錢天門冬一錢麥門冬去心一錢黃柏蜜炒一錢五味子十五粒柴胡去蘆一錢地骨皮一錢知母去毛蜜炒一錢上十七味作一劑姜五斤棗一枚水煎食後服太平丸治虛火嗽肺痿肺癰並宜服之天門冬去心皮一兩麥門冬去心一兩知母去毛蜜炒一兩貝母一兩款冬花五錢杏仁去皮尖五錢京墨五錢桔梗一兩薄荷一兩上十味俱為細末煉蜜為丸如彈子大每細嚼一丸薄荷湯下人參黃耆散治虛勞客熱肌肉消瘦四肢倦怠五心煩熱口燥咽乾頰赤心驚日晡潮熱夜多盜汗胸脅不利咳嗽膿血稠黏人參五分秦艽一錢白芍一錢白茯苓一錢黃耆蜜炒一錢知母去毛蜜炒一錢桔梗一錢桑白皮蜜炒八分紫菀取茸一錢柴胡一錢鱉甲醋炙一錢生地黃薑汁蒸一錢天門冬去心皮一錢上十二味姜引水煎服天門冬丸治虛勞吐血咯血咳嗽喘急大寧肺氣天門冬去心皮一兩杏仁去皮尖五錢貝母一兩茯苓一兩阿膠珠一兩上五味俱為細末煉蜜為丸彈子大日三丸噙化潤華膏治一切勞嗽肺痿喘急並皆治之人參五錢麥門冬去心一兩阿膠珠一兩款冬花五錢紫蘇五錢五味子一兩杏仁去皮尖五錢百藥煎五錢貝母一兩粟殼去筋膜五錢烏梅肉一兩桔梗一兩上十二味為細末蜜丸彈大臨臥噙化青蒿丸治骨蒸煩熱鬼氣用青蒿一握豬膽一枚杏仁十四個去皮尖炒以童便一大盞煎五分空心溫服青蒿煎治虛勞盜汗煩躁口乾用青蒿取汁熬膏入人參末麥冬末各一兩熬至可丸如梧子大每食後米飲下二十丸又方治骨蒸煩熱鬼疰用青蒿五寸八九月帶子者最好細嫩者和納大釜中以猛火煎三大斗去渣溉釜令淨再以微火煎至二大斗入豬膽一枚同煎一大斗去火待冷以瓷器盛之每欲服時取甘草二三兩炙熟為末以煎和搗干杵為丸空腹粥飲下二十丸漸增三十丸止又方治虛勞寒熱肢體倦痛不拘男婦八九月青蒿成實時採數枝童便浸三日曬乾為末每二錢烏梅一個煎湯服又方治男婦勞瘦青蒿細銼三升童便五升同煎一升半去渣入瓷器中煎成膏丸如梧子大每空心及時溫酒下二十丸又方治婦人骨蒸煩熱寢汗口乾引飲氣喘天門冬十兩麥門冬八兩並去心為末以生地黃三斤取汁熬膏和丸梧子大每五十丸以逍遙散湯煎下又方治傳尸癆瘵王瓜焙為末每滾白湯服一錢一方治虛勞內熱下焦虛熱骨節煩疼肌肉急小便不利大便數少氣吸吸口燥熱淋用大麻子五合研水二升分服四五劑瘥一方治虛勞不足糯米入豬肚內蒸熟搗做丸子日日服河車丸治婦人癆瘵勞嗽虛損骨蒸等症用紫河車幼生男子者一具以長流水洗淨熟煮劈細焙乾研山藥二兩人參一兩白茯苓半兩為末酒糊丸梧子大麝香養七日每服三十五丸溫服鹽湯下集驗方治五癆七傷吐血虛瘦用初生胞衣長流水洗去惡血待汁出乃止以酒煮搗如泥入白茯神和丸梧子大每米湯下百丸忌鐵器
