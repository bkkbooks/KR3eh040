body:
  text: 卷四痰火灸法竊謂人之一身隱僻奇異等疾軒岐議究已備華他內照無遺矣然攻病之法每以針灸劫拔為言而其藥餌之中殊未言及何也蓋古人立法病之輕淺者則以丸散飲湯調治之病之年久沉痼者非針灸不解以其針有劫奪之功第見效者少且今之針法得妙者亦稀若虛怯之體倏致夭絶者有之若灸法去病之功難以枚舉而其寒熱虛實輕重遠近無往不宜蓋寒病得火而散者猶烈日消冰有寒隨溫解之義也熱病得火而解者猶暑極反涼自火鬱發之之義也虛病得火而壯者猶火迫水而氣升有溫補熱益之義也實病得火而解者猶火能消物以實則瀉之之義也痰病得火而解者以熱則氣行津液流通故也所以灸法不虛人者以一灼謂一壯以壯人為法也若年深痼疾非藥力所能除必借火力以攻拔之諺云火有拔山之力豈虛語哉若病欲除其根則一灸勝於藥力多矣但醫必擇其素熟經絡穴道者乃可不爾則差之毫釐謬之千里非徒無益而反害之豈以人命若草菅耶然火之功用固有挽回枯槁之妙必其人肌肉尚未盡脫元氣尚未盡虛飲食能進者乃能任此痛楚灸後調理月餘則病自除而體自充況假此一灸使病者有所禁戒警惕自是如法調理是以一舉有兩得之妙若肌體羸虛元氣耗極飲食不能進則亦不能禁此燔灼病必日劇倘灸後病不得起不惟無益而反招病家之怨也至囑至告制艾法凡用艾葉須陳久者治令細軟謂之熟艾若生艾灸火則傷人肌脈故孟子云七年之病求三年之艾揀取淨葉搗去塵屑石臼中木杵搗熟羅去渣滓取白者再搗至柔爛如綿為度用炷燥則灸火有力取火法凡灸火者宜用陽燧火珠承日取太陽真火其次鑽槐取火為良若急卒難備則真麻油燈或蠟燭火以艾莖燒點於炷滋潤灸瘡至愈而不痛也其戛金擊石鑽燧八木之火皆不可用邵子云火無體因物以為體金石之火烈於草木之火是矣八木者松火難瘥柏火傷神多汗桑火傷肌肉柘火傷氣脈棗火傷內消血橘火傷營衛經絡榆火傷骨失志竹火傷筋損目也凡痰火骨蒸癆瘵夢遺盜汗傳尸等症宜灸四花六穴膏肓二穴腎腧二穴肺腧二穴足三里二穴手合谷二穴或膻中穴但得穴真無不驗也定四花六穴之法崔氏灸骨蒸癆瘵初得此疾即如此法灸之無不效者但醫多不得真穴以致有誤今具真格使學者一見瞭然無誤先用細繩一條約三四尺以蠟抽之勿令展縮以病人腳底貼肉量男取左足女取右足從足大拇指頭齊起從腳板底當腳根中心向後引繩循腳肚貼肉直上至膝脘曲又中大橫紋截斷次令病人解發分開兩邊全見頭縫自囟門平分至腦後乃平身正坐取前所截繩子一頭從鳩尾齊引繩向上正循頭縫至腦後貼肉垂下循脊骨引繩向下至繩盡處當脊骨以墨點記此墨不是灸穴別以稻稈心令病人合口將稈心按於口上兩頭至吻卻勾起稈心中心至鼻端根下如人字樣齊兩吻截斷將稈展直於先在脊中墨記處取中橫量點之此是灸穴名曰患門二穴初灸七壯纍灸至一百壯妙初只灸此二穴次令其人平身正坐稍縮臂膊取一繩繞項向前平結喉骨骨平大杼骨俱以墨點記向前雙垂下與鳩尾齊截斷灸鳩尾穴卻翻繩向後以繩頭齊會處以墨點記此亦不是灸穴別取稈心令其人合口無得動笑橫量兩吻截斷還於背上墨記處摺中橫量兩頭點之此是灸穴又將其稈心循脊直量上下點之此是灸穴名曰四花穴初灸七壯纍灸至百壯逮瘡疾愈依前法復灸至百壯但當脊骨上兩穴切宜少灸凡一次只灸三五壯多灸恐人蜷背凡灸此穴亦要灸足三里以瀉火氣為妙若婦人纏綿裹足以至中短小則第一次患門穴難以量准但取右手肩髃穴貼肉量至中指為盡亦可不若只取膏肓穴灸之其穴備於後次灸四花穴亦效豫常見人初有此疾即與依法灸之無有不效惟恐病根深痼亦依此法灸之亦有齊愈者況初病者乎千金方論取膏肓腧穴法膏肓腧穴無所不治主羸瘦虛損夢中失精上氣咳逆狂惑失志等症取穴之法令人正坐曲肘伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得搖動從胛骨上角摸索至胛骨下頭其間當有二肋兩開灸中間依胛骨之裡肋間深處是穴骨容側指許摩筋肉之表肋骨空處按之但覺牽引骨節動須灸胛中各一穴至六百壯多至千壯當覺氣下礱礱然如水狀亦當有所下出若無停痰宿飲則無所下也若病已困不能正坐當令側臥挽一臂同前灸之也求穴大較以右手從左肩住指頭表所不及者是也左手亦然乃以前法灸之若不能正坐但伸兩臂亦可伏衣幞上伸兩臂令人挽兩胛骨使相離不爾胛骨遮穴不可得也所伏衣幞當令大小常定不爾則失其穴此灸訖後令人陽氣康盛當消息以自補養身體平復其穴在五柱之上四柱之下橫去六寸許相准望取之論曰昔秦緩不救晉侯之疾以在膏之下肓之上針藥所不及即此穴也孫真人笑其拙不能求得此穴所以宿疴難遣若能用心得而灸之無疾不愈矣明載於此學者仔細詳審依法取之無不得其真穴也一法醫者先自坐以目平正卻於壁上以墨作一大圈卻令患者正坐常使其目視圈無得斜視別處此良法也令灸人正坐曲脊伸臂依法醫者以指揣後脊骨一節為一寸自一柱至五柱逐一以墨點記令上下端直分明且人有頸骨者亦有無者當以平肩為一柱是也以四柱至五柱用稈心比量兩柱上下遠近摺為三分亦以墨點脊上柱間取第四柱下二分微多五柱上一分微少用筆點定橫過相去六寸之中左右以為兩穴交下遠近之准大要兩柱上下合同身寸一寸三分七釐微縮有無大段長短不同以參者甲乙經自大杼至尾骶骨作二十一柱量三尺之數分之若柱節分明縱之尺寸不同穴以柱數為定若人肥大背厚骨節難尋當以平齊十四柱命門穴為準上自大杼下至命門摺為一十四柱每柱一寸三分合其穴無不真也取腎腧穴法令患人垂手正立於平正木石之上目無斜視身無偏欹去身上衣服用切真杖從地至臍中央截斷卻回杖子於背上當脊骨中杖盡處即十四柱命門穴也以墨記卻用稈心取同身三寸摺作一寸五分兩頭即腎腧穴也取肺腧法當脊下第三椎骨下凹中以墨點記各開一寸五分是穴取膻中法胸前平乳當中一穴取足三里穴法足三里二穴在膝下三寸大筋內宛宛中取合谷穴法合谷二穴在虎口岐谷之間陷中論點穴千金云人有老少體有長短膚有肥瘦皆須精思斟量准而折之又以肌肉文理節解縫會宛陷之中是以手按之病者快然如此仔細安詳用心者乃能得之爾又云或身短而手長或身長而手短成胸腹長指胸腹短或大或小又不可以一概而論也凡點穴法皆要平正四體無使歪斜灸時恐穴不正徒壞好肉爾若坐點則坐灸臥點則臥灸立點則立灸反此一動則不得真穴矣凡灸先陽後陰先上後下先少後多皆宜審之論艾炷大小黃帝曰灸不分三是謂徒炷務大也小弱也乃小作之凡小兒七日以上周年以還不過壯炷如雀糞大經曰凡灸欲艾炷根下廣三分使正氣不能遠達病未能愈則是炷欲大惟頭與四肢欲小耳但去風邪而已論壯數多少千金云凡言壯數者若丁壯病根深篤可倍於方數老少怯弱可減半扁鵲灸法有至百壯千壯曹氏從治有百壯大十壯小品方亦然惟明堂經多雲針入六分灸三壯更無餘論故後人不準惟因病之輕重而增損之凡灸頭頂止於七壯積至七七壯止如人若治風則灸上星前頂百會皆至一百壯腹皆宜灸五百壯若鳩尾巨闕亦不宜灸多多則四肢細而無力又足三里穴乃云多至三二百壯心腧不灸若中急灸至百壯皆視其病輕重而用之不可泥一說而又不可不擇一說也內經只云若是禁灸穴明堂亦許灸一壯至三壯恐未盡也所謂五百壯千壯豈可一日而盡必三五七日以至三年五年以盡其數乃可得也論忌避千金云欲行針灸必先知本人行年宜忌尻神及人神所在不與禁忌相干則可故男忌除女忌破男忌戊女忌己又所謂血支血忌之類凡醫者不能知此避忌若逢病人厄會男女氣怯下手至困達人智士豈拘於此若夫急難之際卒暴之疾命在須臾宜速治之況泥於禁忌已淪於鬼神豈不誤哉但一日止忌一時如子午八法不拘禁忌若忌未形之病雖擇良日服藥針灸當也亦宜架天時日正午以後乃可灸謂陰氣未至灸無不著午前及早恐人氣虛有眩暈之咎急卒亦不可拘若值大風大雨雷電宜暫停之且待晴明灸之可也論治灸瘡凡艾灸須要瘡發所患即愈不得瘡發其疾不愈甲乙經云灸瘡若不發用故履底炙令熱尉之三日而發今有用赤皮蔥三五莖去葉於微火中煨熱尉瘡十餘遍其瘡三日自發亦有用麻油搽之而發者亦有用牙皂角煎湯候冷頻頻點之而發者恐氣血衰有宜服四物湯滋養者不可一概而論灸後務令瘡發乃去病也凡貼瘡古人春用柳絮夏用竹膜秋用竹膜冬用兔腹上細毛貓腹毛亦佳今人每用膏藥貼之日一二易則瘡易愈未若一日兩貼一易使瘡膿出多而痰除也若欲用膏必須用真麻油入治病之藥或祛風散氣滋血療損之藥隨症入之為妙論忌食經曰灸之後古人忌豬魚熱面生酒動風冷物雞肉最毒而今灸瘡不發用小雞鰱魚食之而發者所謂以毒而攻毒其理亦通亦宜少用為佳論保養凡灸後切宜避風冷節飲酒戒房勞喜怒憂思悲恐七情之事須要除之可擇幽靜之居養之為善但君子志人不必喻也擇吉日針灸吉日丁卯庚午甲戌丙子丁丑壬午甲申丙戌丁亥辛卯壬辰丙申戊戌已亥庚子辛丑甲辰乙巳丙午戊申壬子癸丑乙卯丙辰己未壬戌成開執日忌辛未扁鵲死日吉日月橫看正二三四五六七八九十十一十二夭巫辰巳午未申酉戌亥子醜寅卯天醫醜寅卯辰巳午未申酉戌亥子要安寅申卯酉辰戌巳亥午子未醜正二三四五六七八九十十一十二白虎黑道午申戌子寅辰巳申戌子寅辰月厭戌酉申未午巳辰卯寅醜子亥月殺醜戌未辰醜戌未辰醜戌未辰獨火巳辰卯寅醜子亥戌酉申未午死別戌戌戌醜醜醜辰辰辰未未未血支醜寅卯辰巳午未申酉戌亥子血忌丑未寅申卯酉辰戌巳亥子午除日卯辰巳午未申酉戌亥子醜寅破日申酉戌亥子醜寅卯辰巳午未火隔午辰寅子戌亥午辰寅子戌申遊禍忌服藥巳寅亥申巳寅亥申巳寅亥申痰火戒忌夫痰火之證有治愈而老且壽者有纏綿數紀而終不可療者有一病即治竟不愈者何也如器物已損必愛恤護持乃可恆用而不敝若不恤而顛擊之寧有不壞者乎然痰火固為惡候治之愈與不愈亦在人之調攝何如爾且病之作也始於水虧法當絶欲存精精足則水自復繼而火熾則當薄味救水水充則火自滅次必戒酒以養金金氣清肅則生化之機復行子受母蔭則真陰自復水得其權則火自平矣故治而愈者以此三者之法可缺一乎若即病而仍酗酒恣欲嗜啖膏粱以火濟火其得長生者幾希戒忌針絶戒暴怒最遠房室更慎起居尤忌憂鬱順就寒暄節調飲食毋以我言虛僞無益一或失調噬臍何及戒酗酒夫四氣以酒為先者蓋以味甘適口性悍壯志賓朋無此不可申其敬爾然聖人以酒為人合歡又曰惟酒無量不及亂若此觀之古人制酒惟歡情適況而已可恣飲而至劇乎今之貪者以酒為漿以劇為常必至酩酊而後已凡一醉之間有事迥異肆志顛狂或助欲而色膽如天或逞威而雄心若虎或以新搜故罵詈不避親疏或認假作真鬥毆無畏生死或傷其天性或敗壞人倫乖名喪德無所不為甚而忘形仆地促其天年者藉藉酒之酷厲奚帝鴆蝮也哉況人既病水則火已萌其焰矣杯酒下咽即猶貯燼點以硝黃涸海燎原其可量乎蓋酒之為性慓悍升浮氣必隨之痰鬱於上溺澀於下渴必恣飲寒涼其熱內郁肺氣大傷輕則咳嗽齁喘重則肺痿癆瘵觀其大寒凝海惟酒不冰明其性熱獨冠群物藥家用之惟藉以行其勢爾人飲多則體敝神昏其毒可知矣且曲中以諸毒藥助其勢豈不傷沖和損營衛耗精神竭天癸而夭人壽耶絶房勞夫四欲之中惟色最甚雖聖賢不能無此故孔氏曰吾未見好德如好色者也孟氏亦曰養心莫善於寡欲又曰血氣未定戒之在色若此觀之則色亦人所難制者今之膏粱逸士晝夜荒淫以此為樂若悅芻豢嗜而無厭必待精竭髓枯氣匱力乏而後已昧而失調安能免於死哉悲夫覺者豈如是乎逮夫真水既虧則火炎痰聚而癆瘵之症成矣當此之際法宜存精以覆水奈火伏水沸心神浮越虛陽妄動竟不能制而復泄其精則猶源將涸而流將息而復導之寧不竭乎噫病至於此非醫者之神手凝神定慮以治病者之欲心割情絶愛病者亦宜割情絶愛以副醫者之心庶幾可治耳戒嗜利夫諸欲之內惟財則利益人多蓋人非財則無以治其生故諺云財與命相連然財固人所必用但輕重較之則財又輕於命也何則人既病火則危如纍卵善調則生失調則死豈常病之可例視乎必靜心寡欲凝神定慮毋以纖物煩擾心君庶火息水恬病或可瘳於此而孜孜汲汲終日營營致天君失泰而相火擅權勢必燎原矣利可趨乎戒暴怒夫氣貴順而不貴逆順則百脈暢利逆則四體愆和若以火病而復增一怒則猶敝艦而橫之波濤鮮有不覆者也何則以虛其虛則陰陽乖戾臟腑隔絶其不危者鮮矣且今之昧者但知怒能害人殊知賊人心氣者有九曰怒則氣上喜則氣緩悲則氣消思則氣結恐則氣下驚則氣亂勞則氣耗寒則氣收熱則氣泄若此諸氣實人所自致者也況痰火之病始於真氣勞傷腎陰虧損而邪熱乘虛協之故丹溪曰氣有餘便是火然所謂有餘者非真氣之有餘謂真氣病而邪火相協或行而迅速或住而壅塞氣火俱陽以陽從陽故陽愈亢而陰愈消所謂陰虛生內熱者以此即如勞傷神志心血虧耗腎水枯竭君火失令相火司權熏爍肺金之意耳況七情之氣惟怒最甚故經曰怒則血菀於上以其情動於中氣逆於上動極生火火載血上錯經妄行越出上竅故鑽燧取火撫掌成聲沃火生沸皆自無而有實動極之所致也噫以一星之火而致燎原之禍氣豈可逆乎節飲食夫飲食所以養生過則傷脾若過極則亦所以戕生者也何則痰火之病始於水涸火炎金傷金既受傷則木寡於畏其不凌脾者鮮矣以脾受木賊則運化之機自遲而復不能節其飲食以致傷而復傷輕則噯腐吞酸重則痞滿疼痛病體復加有此則亦難乎其為治也蓋欲攻積則妨正欲溫中則動火過消導則反損脾三者之法豈其宜乎況人藉水穀之氣以為養土受木賊則不能運化精微上歸於肺輸布五臟以養百骸自是形日減肌肉日消其人即能飲能食無乃食㑊而已更何益耶此謂調攝之一關也可不謹哉慎起居竊謂火病金傷之體實由敝室陋巷倘無趨避之策風狂雨驟其何以御之耶蓋肺主皮毛司腠理闔閉金受火賊則衛護斂固之令失權六淫之邪易於侵襲輕則入於皮膚但為嚏唾涕咳諸候惟以身表溫暖腠理疏豁不幹真氣或可消散甚則入於經絡表有頭痛發熱身痛脊強不即發汗則必入里而為潮汗閉澀滿渴等症不即下之邪何以越然以尪羸之軀幾微之氣而復任此猖狂虛虛之禍豈不旋踵而至哉噫倘不慎起居而或犯此是亦促命之殺車槌也慎之簡言語氣鼓喉而為聲情發心而為言故曰聲者肺之韻言者心之聲且火之病以水虧火熾熏爍肺金傷其生化母令子虛致水益虧而火益熾肺愈傷而金益烈法當滋陰降火以益金以言多語急鼓傷肺竅則為咳嗽聲嘶且言則呼多吸少致息不勻則五臟之氣亦自愆期矣所謂肺欲實先調息正此之謂言可多乎忌憂鬱夫氣貴舒而不貴郁舒則周身暢利鬱則百脈違和故曰喜則氣緩然緩者固有徐和暢利之義但不及太過皆能致息愆期而況憂思鬱結寧不滯其氣乎氣既壅滯則鬱而為火是益為爍金涸水之胎人既病火則身猶敝器矣須著意護持心當渾然無物庶可登之佳境倘以世務營心終日怏怏是欲蹈萬古之長夜寧非昧而不覺者乎哀哉愚謂痰火之病能戒則功過藥之半矣蓋攻邪去病固藉藥劑之能而燮理調元又非戒忌不可何也夫所謂戒者以其於病有大妨法所當戒不戒則死所謂忌者以其於病有所不宜法當忌之不忌則害二者實痰火死生之關頭也可缺一乎然所當戒者酒色財氣之四欲也所當忌者飲食起居多言厚味之四失也病人能守此八者則勝於藥力多矣如恣欲則傷精絶之則所以存精足水以制火也若暴怒則傷肝戒之則所以平肝安土以養金也貪欲則傷肺戒之則以清金制木無使凌脾也嗜利勞神戒之則所以寧火而肅金而充水也慎起居所以防賊風虛邪之犯正節飲食毋使菀茁陳莝以留脾簡言語所以保金以育水薄厚味所以息火毋傷金若此八者利益固非小可而其害也則輕可致重重可致危顛沉困憊皆胎於此病者倘能一一遵依小心翼翼則危可至泰輕可至愈挽回枯槁於幽冥之谷其可量乎卻病祕訣夫修身之士不識丹田所在咸指臍下一寸三分為言謬乎有傳此為氣稟之原若果實受氣於蒂坎離上下以此為中宮氣脈升降以此為根地根地否塞則水火不能升降心火炎熾腎水枯竭百病由此而生上或頭暈眼花下至腰疼疝凝痔結甚或真陽不固多至夭折良可悲乎人誠能以卻病延年之法敬而行之或行或坐或立或臥念念不忘旬日之間血氣循視而不亂精神內固而不搖衰者起萎者愈疲癃轉康健之軀枯槁回溫潤之色頓覺增精補髓養氣助陽眼目光明疝痔消滅身輕力健百病咸除功簡而效速誠為保身之至道卻病之祕訣哉卻病延年一十六句之術水潮除後患起火得長安夢失封金匱形衰守玉關鼓呵消積滯兜禮治傷寒叩牙齒無疾觀升鬢不斑運睛除眼害掩耳去頭旋托踏應無病搓塗自駐顏閉摩通滯氣凝抱固丹田淡食能多補無心得大還水潮除後患法平時睡醒時即起端坐凝神息慮舌抵上齶閉口調息津液自生分作三次以意送下此水潮之功也津既咽下在心化血在肝明目在脾養神在肺助氣在腎生精自然百體調暢諸病不生此除後患之功也逍遙子長生訣曰法水潮在關逍遙日夜還於中凝結生諸病才決通流便駐顏起火得長安法子午二時內外視應閉息升身則腎中之火生矣火為水中之金烹而煉之立可成丹且百脈通融五臟無滯四肢康健而三化聚也孫真人曰火陽得地在六爻俱靜之時真氣通行必在三陽交會之際此為文火煉形外邪不感壽算無窮夢失封金匱法欲動則火熾火熾則神疲神疲則精滑而夢失也每寤寐之時必要凝息定氣以左手搓臍二七右手亦然復以兩手搓脅腹五七次左右搖肩三兩回次咽氣納于丹田握固良久乃正屈足側臥永無走泄矣鄭思遠真人曰事多忘者神昏汗多出者神脫此是夢失神弱脫漏真精乃修身之士大忌也當勵前功形衰守玉關法形容枯槁切須守爐爐者丹田丹田者腎前臍後也若行住坐臥一意不散固守勿怠而又運用周天之火自然生精生氣生神豈止變衰顏如童子體為神仙若壯健行之收功甚速鼓呵消積滯法有因食而積者有因氣而積者久則脾胃受傷醫藥難治孰若節飲食戒嗔怒不使有積聚為妙凡有此等便當升身閉息往來鼓腹俟其氣滿緩緩呵出怡然運五七次即時通快王穆真人曰未得通時多痞塞隔氣若胸膈滿塞常用此法不止除病散氣須無病行之自然真元增益壽域可躋兜禮治傷寒法元氣虧弱腠理不密則風寒傷感患者須端坐閉息兜起外腎頭如禮拜屈折至地運用真氣得勝滌時可六七次汗出自愈劉抱一真人未仙之日曾感傷寒熱行此而安此法非止能治傷寒即無病行之頭目清利容顏潤澤叩齒牙無病法齒之有疾乃脾胃之火熏蒸每日清晨或不拘時叩齒三十六通則氣自固蟲蛀不生風邪消散設或以病齒難叩但以舌隱舔於牙根之間用柔制剛真氣透骨其蛀自除玉真人曰欲修大道先去牙症叩齒不絶堅牢無病此雖近易亦修養中之至要也觀升鬢不斑法思慮太過則神耗氣虛血散而鬢斑以子午二時握固端坐凝神絶念兩眼含光中黃內顧追攝二氣自尾閭夾脊升上泥丸降下重樓返還元海憩息少時自然形神俱妙與道合真張真人曰夫何慮鬢斑久久行之可以積黍米而為丹脫樊籠而遊三島其功曷可云論運睛除眼害法虛靜趺坐凝息升身雙目輪轉十二數緊閉即開大睜逐氣每夜行五七次瘴翳自散光明倍常謝翼真人未得仙時曾犯目疾絶去房事得此法而行之即愈故傳以惠於後人蓋為虛邪氣熱損犯肝經致生瘴翳運睛之法不止除昏久則可觀細書畫極目遠視時見金花乃道氣之運也掩耳去頭旋法邪風入腦虛火上攻則頭目昏旋偏正作痛或中風不語半身不遂亦由此致治之須靜坐升身閉息以兩手掩耳搖頭五七次存想元神逆上泥丸以逐其邪自然風散邪去張元素真人未得道時頭目昏旋偏正頭痛用還丹之法不十功即痊此法不止治命須無病行之添補髓海精潔神宮久視長生之漸也托踏應無病法雙手上托如舉大石兩腳前踏如履實地以意內顧神氣自生筋骨康健飲食消融葉子元二十二勢取禽獸行之狀陶隱君二十八道引水火曲升之理知神氣之走五臟自然傳送於四肢根本充固營衛強盛其功盛大不止輕身能令皮膚結實足耐寒暑搓塗自駐顏法顏色憔悴良由心思過度勞碌不謹每清晨靜坐神氣充溢自內而外兩手搓面五七次須漱津塗面搓拂數次行之至半月則皮膚光潤容貌悅澤大過尋常太虛真人晚年修道恥於衰弱得此法而返老還童若咽氣通心搓熱塗面亦多有益閉摩通滯氣法氣滯則痛血凝則腫治須閉息以左右手摩滯處四十九次復左右多以津塗之不過五七次氣自消散趙乙真人未仙之時曾患此病行之而愈此法不止散氣消腫無病行之上下閉息左右四肢五七次經絡通暢氣血流行肌膚光潤名曰干沐浴尤延生之道也凝抱固丹田法定息抱臍子午無間動徹浮沉湛然進退旬日之間下進五穀之精真氣自生百日之功上盡九重之蠹暗滌垢膩飢渴不患寒暑不侵駐顏還少董自然真人道西華天尊守真或居天上或居人間一炷紫檀手披雲霧坐禪關淡食能多補法五味之於五臟各有損益若一味過食須安一臟還虧一臟要在相勻謹節僅圖爽口反見傷脾食淡自然有補耳玄珠先生得此法而成化古云斷鹽不是道孰為補腎茹增福田卻非養神之道淡食中自有真氣可以保命安神無心得大還法對鏡無好惡之心亦不可落空心而識執之心盡無也知識之心又生分別執著之心不可有也志公和尚無心有心此心乃合天地夫無心法有事無事常要無心靜處喧處其念無二又曰莫謂無心即是道無心即膈一重關如明鏡照一切物也元不染著是謂大還也運識五臟升降法上心腎之下肝西肺在東非腸非胃腑一氣自流通動功六字延壽訣春噓明目本扶肝夏至呵心火自間秋呬定知金肺潤冬吹腎要坎中安三焦嘻卻除煩熱四季長呼脾化餐切忌出聲聞兩耳其功尤甚保神丹心呵頂上連叉手舉手則呵反手則妄呵則通於心去心家一切熱氣或上攻眼目或面色紅舌上瘡或口瘡故心為一身五官之主發號施令之時能使五官不同故孟子曰收其放心者為浩然之主故心不動而動謂之妄妄則神散而使浩然之氣不清也秋冬時常暖其湧泉不傷於心君素書云足寒傷心是也澄其心則神自清養其心則火下降故心火降則心無不正心通舌為舌之官舌乃心之苗為神之舍又為血之海故血少則心神恍惚夢寐不寧也冬面紅受克故鹽多傷心血冬七十二日省咸增苦以養其心氣也肝若噓兮自睜睛噓則通肝去肝經一切熱聚之氣故膽生於肝而膽氣不清因肝之積熱故上攻眼目大噓三十次一補一瀉則眼增光不生眼屎故目通肝肝乃魂之宅夜睡眼閉則魂歸宅肝為目之官秋面青受克辛多傷肝秋七十二日省辛增酸以養肝氣腎吹抱取膝頭平吹則透腎去腎中一切虛熱之氣或目昏耳聾常補瀉則腎氣自調矣故腎通耳為耳之官耳聽於走精不可聽於淫聲或鼓腹者大吹三十吹熱擦腎堂立止四季十八面黑受克甘多傷腎故季月各十八日省甘增咸以養腎氣肺如呬氣手雙擎呬則通肺去肺家一切所積之氣或感風寒咳嗽或鼻流涕或鼻熱成瘡大呬幾呬一補一瀉則肺氣自然升降肺為心之華蓋最好清故肺清則不生疾也肺通鼻為鼻之官肺為魄之宅也夏面白則受克苦屬火肺屬金夏七十二日省苦增辛以養肺氣脾病生時須撮口呼則通脾去脾家一切濁氣或口鼻四肢生瘡或面黃脾家有積或食冷物積聚不能化故脾為倉稟之官又為血之用故飲食不調則不生血四肢不動則脾困故夜則少食睡時脾不動以致宿食則病生矣脾四季之官為意之宅故意不可以妄動動則浩氣不能清也春面黃則受克春七十二日省酸增甘以養脾氣三焦客熱臥嘻嘻嘻則通膽去膽中一切客熱之氣故臥時常嘻能去一身之客熱能補瀉者膽氣自清目不生屎膽怕熱四時飲食熱者少食於上膈以使膽氣清爽也靜坐功夫清心釋纍絶慮忘情少思寡欲見素抱朴學道之工夫也心清纍釋足以盡瑕絶慮忘情足以靜世思欲俱泯足以造道素朴純一足以知天下安樂之法日務少食寬衣於二六時中遇閒暇則入室蟠膝靜坐心無雜想一念視中丹書云人心若與天心合顛倒陰陽止片時以心觀道道即心也以道觀心心即道也若能清心寡欲久久行之百病不生此惟秋及冬至以後行之尤妙如春夏行持春乃發生之時夏乃陽氣茂盛儒云歌詠所以養性情舞蹈所以養血脈又不必靜坐宜夜眠早起廣步於庭披髮緩行以使長生食後宜動作舞蹈亦宜節欲古人冬至閉關以養微陽齊戒掩身以待陰陽之所定是故起以待日光此陽氣閉藏之時不可擾動筋骨惟安調靜養身體則春夏諸病不生情不動精固則水朝元心不動氣固火朝元性寂則魂藏水朝元情忘則魄伏金朝元四大安和則意定土朝元此謂人有五氣朝元又經云人能長清淨天地悉皆歸
