body:
  text: 卷一痰火證論夫癆者勞也以勞傷精氣血液遂致陽盛陰虧火炎痰聚因其有痰有火病名酷厲可畏者故令人諱之曰痰火也然溯所自來固非一類有稟賦素怯復勞傷心腎耗奪精血而致者有外感風寒傷肺致久咳絶其生化之源而致者有久病久瘧小愈失調復克真元而致者有藜藿勞人傷力吐血致陰虛使然者有膏粱逸士酗酒恣欲勞傷脾胃而致者有薰陶漸染者種種之異難以枚舉至於成癆則一也然將成是症必有預徵兆始焉或頸項結核或腹脅痃癖或素有夢遺或幼多鼽衄漸而有潮汗遺精咳唾吐衄諸血等候外症必形容憔悴肌體尪羸毛髮焦枯脈必弦澀芤虛總之臟氣偏虧亢害無制因而致此極也所治之法必審其各臟外症以徵其內亢乃施驅賊補母之法庶得肯綮如肺病傳肝則面白目枯口苦自汗心煩驚怖法當清金補水以益木腎病傳心則面黑鼻乾口瘡喜忘大便或祕或瀉法當折水補木以益火肝病傳脾則面青唇黃舌強喉哽吐涎體瘦飲食無味法當伐木補土以益火心病傳肺則面赤鼻白吐痰咯血咳嗽毛枯法當瀉火補土以益水脾病傳腎則面黃耳枯胸滿胻痛遺精白濁法當瀉土補金以益水此五臟亢害承製之證治也更有骨蒸尸疰種類亦多無乃陰虛之極治法亦必益水清金滋陰降火越於是法豈其然乎至於傳尸一症則有伏連殗殜等名其狀不一葛氏已立治矣所制青蒿煎天庭蓋散亦皆殺蟲杜後之劑然預圖早服庶不貽殃也倘至顛危沉困之際則病深蟲老雖倉扁亦望而畏焉痰火證治夫痰火者癆瘵之晦名病之最酷者也然以病之先後言則火為痰之本痰為火之標而其陰虛則又為致火致痰之本矣何則陰虛則火動火動則痰生所謂痰火者寧非言末而忘本耶人之一身金水二臟不可暫傷蓋金為生化之源水為生生之本真陰既虧則火自偏勝火既偏勝則上炎爍金金母既傷則生化之源已息而水子何以借其胎養乎夫一水既虧則五火相煽火迫肺而為咳痰壅喉而為嗽所以咳嗽一症為亡津液之肇耶以其傷於生化母子俱病真水日涸益為致火之胎於是陰愈消而陽愈亢燔爍蒸炎迫血上行越出諸竅而為咳唾吐衄等候況血為有形難成易虧可驟補耶血失既多則陰暴脫而陽亦微陽微則惡寒陰虛則發熱故寒熱似瘧者乃陰消陽敗之證諦至於潮熱則又為陰虛之極也陰虛至極則相火擅權致君不務德矣精固藏於腎然聽命於心心腎之液兩虧則水火不交陽主開泄自致玉關無約由是一夢即遺不交而漏病者即欲固守其可得乎真陰既竭則孤陽無根內經云潰潰乎若壞都汨汨乎不可止者正此謂也然是證之由在於分毫之異實猶淄澠水合非易子可能辨哉如始於嗜欲水虧致火炎爍金母子俱虛咳而多痰遺滑者脈必弦長緊實或滑而數此火鬱內實不受補者也法當君以益水如熟地玄參五味枸杞山藥之類佐以清金二母二冬沙參紫菀等味使以降火梔芩柏草是也如始於風寒邪郁久咳傷肺嗽血漸至水虧此金絶生化之源母令子虛脈必浮而芤濡虛火遲緩無力或沉而遲澀弱細結代皆虛而不足可補者也法當以益肺如參耆山藥之類佐以滋腎熟地五味玄參山茱等品使以清金斂肺二母二冬片芩沙參烏梅五味白芍之屬是也若始於過力傷筋動極逆氣肝不納血因而妄出上竅遂致陰虛者法當君以益肝如當歸牛膝芍藥等味佐以養氣決明白朮柏仁生薑等品使以消瘀丹皮紅花鬱金之類更以熟地枸杞杜仲以補其母兼以二冬知芩沙參以杜其賊庶乃圓神若水涸肺燥咯唾咳嗽法當潤肺清金如蛤蚧阿膠二冬百合貝母花粉是也其曰五臟相傳者乃五臟之氣自相戕賊也如肺賊肝者必面白目枯口苦自汗心煩驚怖以白為肺之色目乃肝之竅口苦自汗心煩驚怖皆屬心病此母令子虛之候也法當君以益肝以當歸白芍牛膝續斷以補肝之血以決明白朮柏仁菊花益肝之氣以枸杞杜仲熟地阿膠菟絲子以補肝之母佐以知母訶子麥冬片芩以瀉肺之實使以麥冬酸棗茯神以清心而鎮神也如腎賊心者必面黑鼻乾口瘡喜忘大便或祕或泄以黑為腎之色鼻為肺之竅大便或祕或泄亦皆金病口瘡喜忘又屬心恙此水剋火火剋金之義也法當君以益心用茯神遠志菖蒲以益心之氣當歸熟地以補心之血酸棗烏梅生薑陳皮以補心之母澤瀉車前茯苓以制水之淫使以片芩知母二冬紫菀以潤金之燥也若肝賊脾者必面青唇黃口強舌哽吐涎體瘦飲食無味以青為肝之色唇為脾之外候余皆肝之本病此木剋土之義也法當君以補土以參耆升葛補脾之氣白朮白芍大棗膠飴以補脾之血桂心茯苓以補脾之母佐以芍藥烏梅以瀉木之實以膽草芩連梔子以瀉肝之火以二冬二母百合阿膠以堅金之肅也若心賊肺者必面赤鼻白吐痰咯血喘咳毛枯以赤為心之色鼻為肺所屬余皆肺證此火剋金之候也法當君以瀉火用甘草人參赤苓朮通黃柏以瀉氣分之火玄參丹參丹皮地黃以徹血分之熱使以黃連瀉心子之實佐以二冬百合貝母阿膠以保肺潤燥使以參耆芍朮大棗甘草膠飴以益肺之母也如肺賊腎者必面黃耳枯骨滿胻痛遺精白濁以黃為脾之色耳為腎之竅腎主骨故胻痛余皆水病此土剋水之候也法當君以益水用知母玄參補骨脂以益腎之氣熟地黃枸杞黃柏五味山茱以補腎之血佐以梔子豆豉萊蔔子以瀉脾之子訶子防風桑白皮以泄土之實使以人參山茱玄參熟地以補腎之母也此古人之成法當的從之惟腎賊心之一證意必邪水淫濕上溢心分以其人真火心血素虧君不主位相火司權乃能令人有面黑鼻乾口瘡喜忘便祕便溏等證此亦心腎不交水火未濟之候寧非濕熱相蒸使之然乎夫真水一臟有虛無實者也不虧足矣而能有餘賊心似非至到之理要之真水無瀉法實火無補法惟敦土清金為善學者思過半矣痰火辨惑聖謂人身生生之本根於金水二臟一水既虧則五火隨熾上炎爍金傷其化源則生生之機已息而癆瘵之證成焉何也夫真水既虧則陽自偏勝以陽從陽物從其類氣得火而行健故陽急陰緩氣疾血徐不相偕隨所以錯經妄行越出上竅而為咳唾等候然血失既多則陰虛陽勝陽既偏勝則自侵陰分亢害所謂陰虛生內熱故其潮汗遺滑證皆胎於此矣諸證既見則日消其陰火專其令上而爍金為咳下涸水為遺金既絶其生化之源則水為涸流之紀矣於是精神日淺肌肉日消毛皮日稿因而致此極也當此之際猶魚遊轍水即沛挽天潢亦何濟哉必神於治者乃可冀其萬一耳雖然病固水虧不察其所虧之由以治安得投其隙乎如始於風寒時未即發致火鬱久咳傷其肺金是謂母令子虛法當君以清金佐以滋水使以降火所謂補母益子伐邪制亢之意也又如久病久瘧真氣已虧復以勞欲損其心腎是謂以虛益虛法當君以益氣佐以滋水使以養血所謂無伐天和之意也又如過力傷筋動而生陽肝不納血血驟妄行致陰虛之極者法當君以養血佐以降火調氣使以消瘀所謂攻守兼備之法也至於膏粱逸士酗酒恣欲致脾腎兩虧水涸火炎金衰木旺母子俱病法當君以補水養血佐以清金益士使以降火平肝所謂治病必求其本也若夫前論所謂五臟相傳之證固為亢害承製所必然者而其所載之候未必一一全具但醫當素蘊胸中惟以面色主之以亢他證但見一二便作受亢之臟主張法當君以益己佐以補母使以伐邪則自中其彀矣倘不察其微而概以制亢恣意伐邪猛浪投劑虛虛之禍咎將安歸痰火玄解愚謂痰火之證本於亡血奪精而其精之與血皆真水真陰有形有質難成易虧者也夫所謂痰火者言末而忘本也蓋真水既虧則相火隨熾壅迫津液為痰故曰痰者火之標然以癆瘵之證謂曰陰虛火動者蓋以一言而括盡病之標本矣內經曰陰虛生內熱蓋熱者火之微火者熱之極火迫津液而為痰則陰虛正謂致火致痰之本而東垣所謂先受病為本次受病為標者非此謂乎今之治者惟曰清痰降火則殊昧治病必求其本之論矣或曰滋陰降火者固為所宜逮考所用之劑母乃四物增以知柏芩連苦寒之味殊不知陰得寒愈消脾得寒愈敗病者得之寧不減食而脹泄乎又寧不陰消而肉削乎然曰滋陰降火者謂益水而勝火也蓋以龍雷之火不可以水伏不可以直折法宜甘溫以補母人參山藥五味之屬以苦堅之知母之屬以苦佐之黃柏之屬豈不聞蕭丘之火乎按古之治癆諸方鮮有不主參耆者蓋古人以血脫者益其氣所謂陰藉陽以生之義耳如婦人産後去血過多上氣喘急命在須臾者名曰孤陽絶陰此陰虛之極者也法當補陰然而不主四物等劑而用參蘇飲劑中惟人參蘇木二味其用也豈古人之愚乎蓋亦本諸內經之旨也夫苦寒之用胎於王氏一言之差遂為萬世之妨愚考本草正誤云雷曰夏月使人參發心痃之患好古曰人參甘溫補肺之陽泄肺之陰肺受寒邪宜此補之肺受火邪則反傷肺氣宜以沙參代之王綸曰凡酒色過度損傷肺腎真陰陰虛火動勞嗽吐血咳血等證勿用之蓋人參入手太陰能補火故肺受火邪者忌之若誤服參耆甘溫之劑則病日增服之過多則死不可治蓋甘溫補氣氣屬陽陽旺則陰消惟宜苦甘寒之藥生血降火世人不識往往服參耆為補而死者多矣言聞曰孫真人夏月服參脈散腎瀝湯三劑則百病不生李東垣亦謂生脈散清暑益氣湯乃瀉火益金之聖藥而雷氏反謂發心痃之患非矣況痃乃臍旁積氣非心病也人參能補正氣破堅積豈有發心痃之理觀仲景治腹中寒氣上衝有頭足上下痛不可觸迫嘔不能食者用大建中湯可知矣王好古言人參補陽泄陰肺寒宜用肺熱不可服王綸因而和之謂參耆能補肺火陰虛火動失血諸病服之必死二家之説皆偏矣夫人參能補元陽生陰血而瀉陰火東垣李氏之説明矣仲景張氏言亡血血虛者並加人參又言肺寒者去人參加乾薑無令氣壅丹溪朱氏亦言虛火可補參耆之屬實火可瀉芩連之屬也二家不察三氏之精微而曰人參補火謬哉夫火與元氣不兩立元氣勝則火邪退人參既補元氣而又補火邪是反復小人何以與甘草苓術謂之四君子耶雖然二家之言不可盡廢也惟其語有滯故守之者泥而執一遂視人參如蛇蠍則不可也凡人面白麵黃面青黧悴者皆脾肺腎氣不足可用也面赤面黑者氣壯神強不可用也脈之浮而芤濡虛大遲緩無力沉而遲澀弱細結代無力者皆虛而不足可用也若弦長緊實滑數有力者皆火鬱內實不可用也潔古謂喘嗽勿用者痰實氣壅之喘也若腎虛氣短喘促者必用也仲景謂氣寒而喘勿用者寒束熱邪壅鬱在肺之咳也若自汗惡寒而嗽者必用也東垣謂久病火鬱在肺勿用者乃火鬱於內宜發不宜補也若肺虛火旺氣短自汗必用也丹溪言諸痛不可驟用者乃邪氣方鋭宜散不宜補也若裡虛吐利及久病胃弱虛痛喜按者必用也節齋謂陰虛火旺勿用者乃血虛火亢能食脈弦而數涼之則傷胃溫之則傷肺不受補者也若自氣短肢冷脈虛者必用也如此詳審則人參可用不可用思過半矣東垣節齋之説本於海藏但論又過於矯激丹溪言虛火可補須用參耆又云陰虛潮熱喘嗽吐血盜汗等證四物加人參黃柏知母又云好色之人肺腎受傷咳嗽不愈瓊玉膏主之是陰虛癆瘵之證未嘗不用人參也節齋私淑丹溪者也而乃相反如此斯言一出印定後人眼目凡遇前症不問宜用不宜用輒舉以藉口致使良工掣肘惟求免去病家之怨病家亦以此説橫之胸中甘受苦寒雖至上嘔下泄去死不遠亦不悟也古今治癆莫過於葛可久其獨參湯保真湯何嘗廢人參而不用耶節齋之説誠未之深思也楊起曰人參載本草人所共知近因病者吝財薄醫醫復算本惜費不肯用人參療病以致輕者至重重者至危然有肺寒肺熱中滿血虛四證只宜散寒消腫補營不用人參其説近是殊不知俱加人參在內護持元氣力助群藥其功甚捷若曰氣無補法則謬矣古方治肺寒以溫肺湯肺熱以清肺湯中滿以分消湯血虛以養營湯皆有人參在焉所謂邪之所湊其氣必虛又曰養正邪自除陽旺則生陰血貴配合得宜耳庸醫每謂人參不宜輕用誠哉其為庸也好生君子不可輕命薄醫醫亦不可計利不用蓋病者薄醫實所以自輕其生醫者計利苟且所以自乖其行也書此奉勉幸毋曰迂痰火緒言凡痰火之證始於陰虛於法當補但證有虛實法有宜忌倘不以脈症互參孟浪投劑則觸處成滯寧無顛覆之患乎蓋以脈之可補者浮而芤濡虛大遲緩無力沉而遲澀弱細結代無力皆虛而不足可補者也當君參耆佐以歸芎芍地務使陽生陰長其病乃愈若於此不補或恣用苦寒則虛虛之禍豈不旋踵而至耶其脈之不可補者弦長緊實滑數有力此皆火鬱內實不受補者也法當君以四物佐以二冬二母沙參玄參等味滋陰抑陽務使水升火降陰祕陽平病或可痊若妄施補則實實之災將焉免之夫脈既已辨又當以證互驗如潔古所謂喘嗽不可補者以痰實氣壅也若氣短不相接證似喘促者蓋腎虛氣短當補者也仲景所謂肺寒而嗽不宜用補者以寒束熱邪壅鬱在肺也若自汗惡寒而咳者表裡俱虛可補者也東垣所謂久病脈實鬱熱在肺宜微發不宜用補若肺虛火旺短氣自汗者陰虛氣衰可補者也節齋所謂陰虛火動不可補者以陰虛火亢能食脈弦而數涼之則傷脾溫之則傷肺此不受補者若自汗短氣肢冷脈虛者必補者也若其人面赤面黑氣壯神強不可行補若面白麵黃面青黧悴者皆脾肺腎不足宜補者也若此細辨則猶蒼素並陳而復誤者真盲瞽者矣凡治痰火之法當以脈驗證脈證既明虛實立辨夫所謂虛者真陰虛也法當補之所謂實者火邪實也法當清之然清補之品亦猶朱紫相凌卒未易辨何也如知母玄參故紙皆補腎之氣也黃柏枸杞熟地阿膠山茱萸五味瑣陽蓯蓉皆補腎之血也人參山茱補腎之母也二冬阿膠貝母百合蛤蚧天花粉皆潤肺之燥也石膏知母訶子粳米瀉肺之火也桑皮地骨皮皆瀉肺之子也五味白芍倍子皆斂肺氣之散也黃柏知母丹皮地骨皮生地玄參茯苓皆瀉命門相火也芡實五味山茱萸牡蠣金櫻子遠志皆固精藥也參耆橘草扁豆皆補脾之氣也芍朮大棗補脾之血也茯苓茯神遠志菖蒲皆補心之氣也當歸熟地皆補心之血也烏梅酸棗生薑皆補心之母也甘草人參赤苓木通黃柏皆瀉心經血分熱也丹參丹皮生地玄參皆瀉心經血分火也梔子生地皆涼心血之品也黃芩竹葉麥冬皆清心經之客熱也當歸牛膝白芍芎藭皆補肝之血也柏子白朮決明皆補肝之氣也枸杞熟地阿膠杜仲菟絲子皆補肝之母也丹皮紅花皆行肝之血也青皮香附皆疏肝之逆也芍藥烏梅皆瀉木氣之實也膽草黃連皆瀉肝之火也五臟消補之品寧越此乎學者諳此則左右逢源雖不中不遠矣凡痰火之證始於陰虛法當滋補葛氏昔擅專門所遺諸方未有不主參耆者厥後因二王不經之論致令醫掣肘遂視人參為蛇蠍惟以苦寒為要藥種種殺人猶不知悟豈不聞丹溪有曰虛火可補須用參耆又曰陰虛潮熱喘嗽吐血盜汗等證四物加人參黃耆知母是治陰虛癆瘵之證未嘗不用人參也況陰虛之極不用人參補陽何以生陰若不服參耆得愈者必真陰尚未甚虧脾胃尚未衰敗脈必浮大而緩故用補血降火之藥或有可愈者但亦稀少耳豫自總髻醫至於今服參耆而愈者十常五七而不服參耆得愈者十無二三蓋陰藉陽生之理歷歷可徵如産後孤陽絶陰之證喘息目瞪心慌膽戰命在逡巡此陰虛之極於法急當補陰而古人不用四物而用人參蘇木二味亦名參蘇飲一服而驗效捷桴鼓生平於此挽回者奚啻百餘人古人之制何其神哉噫陰藉陽生之法當的從之但不明脈理者未足語此痰火咳嗽王氏曰咳為有聲肺氣傷而不清嗽為有痰脾濕動而生痰此咳之所從生也然必察其所由以治庶中肯綮何也外邪致咳風則始必鼻塞聲重自汗惡風法當解之寒則始必惡寒無汗聲清氣壯法當散之若表證重者但或頭痛發熱又當汗之此外感咳嗽之證治也若內傷之咳痰火則甚於清晨法當清痰降火火浮於肺為咳則甚於黃昏治在清金土鬱食積為咳則甚於長夜治在消導理脾若夫陰虛為咳證則不然有多種證諦可徵咳必甚於午後或兼諸血而有潮汗遺滑等候其法則異於諸咳天淵矣貴在清金以益水源壯水以制火亢伐木無令脾虛庶五臟無偏勝之害乃令生化之源復行而生生之機再續加之調攝如宜或可超之寒谷而登陽和之境不爾而一概妄治致人於顛連之鄉則殺人於無形之刃也哀哉聖謂六淫之邪近肺為咳濕積痰涎壅喉為嗽二者脾肺病也若夫癆症咳嗽由則不然何也始於水虧火熾金傷息其生化之源源既絶流則淵注之泉自涸真陰既竭則相火日旺金受火之煅煉則自燥而烈矣是以一火而致金水悉傷母子俱病故咳血聲嗄咽痛益水清金之法可少待耶當此之際五臟已病其三所未亢者惟肝脾而已然金既為火賊則木自寡畏其不凌脾者鮮矣劑中必增以制肝健脾之品益其虧抑其勝庶無木賊土敗之禍於此倘無抑揚之策而反顛倒以治則五臟之氣虧者愈虧而亢者愈亢其不食脾泄肌脫肉消勢所必至其能免乎咳嗽加減主方治陰虛火盛咳而咽乾脈來弦長緊實滑數有力皆火鬱內實不受補者宜此主之麥門冬去心一錢五分治肺虛火嗽或單用亦可天門冬去心皮一錢五分清肺熱保肺氣除痰咳者大甘草生用八分治火熱傷肺咳嗽沙參一錢益肺氣清肺火大益脾土栝蔞仁炒一錢潤肺降火滌白痰為咳嗽之要藥桔梗去頭一錢清肺氣利咽喉為諸藥之舟楫枯黃芩蜜炒一錢瀉肺火消痰利氣滋化源養陰退陽百部去苗一錢除熱咳上氣喘急鮮知母去毛蜜炒一錢忌鐵消痰潤肺滋陰降火治肺熱痰嗽川貝母八分清肺消痰止嗽開鬱降火百合一錢治肺熱咳嗽天花粉一錢治虛熱咳嗽上十二味作一劑用乾柿五片水煎食遠趁熱徐徐緩服若熱盛喘咳及痰多如湧泉者加石膏火煨一錢若久咳嗽唾不出加五倍子五分若咳嗽聲嘶者此金為火爍之甚加訶子肉五分斂而降之若久嗽不止此肺氣散而不收加北五味子五粒嗽而有血此肺竅傷損加阿膠犀角藕汁童便對服虛癆久嗽加減主方治陰虛勞嗽脈來浮而芤濡虛大遲緩無力或沉而遲澀弱細無力皆虛而不足宜於補者以此主之黃耆蜜炒一錢補虛瀉火止痰嗽自汗及咳膿血人參五分補肺氣降肺火及肺虛久嗽北五味十五粒收肺氣止咳嗽乃火熱必用之藥紫菀制過一錢止咳膿血消痰益肺款冬花八分治肺熱勞嗽連綿不絶為溫肺治嗽之要藥生地黃薑汁蒸一錢止咳嗽吐血玄參忌鐵一錢治腎水受傷真陰失守孤陽無根發為火病咳嗽唾血證沙參一錢益心肺清肺火治久嗽肺痿天門冬去心皮一錢保肺氣定喘促為地黃之使麥門冬去心二錢止勞嗽定虛喘除肺熱主心煩治陰虛及口渴知母去毛忌鐵蜜炒一錢消痰止嗽清心肺療骨熱煩蒸上十一味作一劑水煎緩服若咳嗽痰結咽喉不利肺燥喘咳加炒栝蔞仁一錢若勞嗽上氣胸脅不利加貝母八分若嗽而失聲由火燥爍金損傷肺竅極為難治加訶子肉八分若胸脅痞滿少食此肝木賊脾加山藥白芍醋炒青皮少許若咳而多汗加酸棗仁微炒五分倍黃耆若咳而有血加阿膠八分磨犀角藕汁童便對服若咳而遺滑加茯神山茱萸肉各一錢間服六味丸若咳而骨蒸加地骨皮一錢附簡易方蘇遊鳳髓湯治肺燥咳嗽用松子仁一兩胡桃仁二兩研膏和熟蜜收之每二錢食後沸湯點服又方治虛熱咳嗽口乾涕唾用甘蔗汁一升半青粱米四合煮粥日食二次極潤心肺又方治咳嗽吐血人參黃耆飛面各一兩百合五錢為末水丸梧子大每五十丸食前茅根湯下又方用人參硃砂等分為末烏梅肉丸彈大每白湯下一丸日一服又方治肺熱咳嗽沙參五錢水煎服附拙見治驗一童子年十三歲患咳盜汗遂請幼科治之乃曰小兒汗不必服藥一月後兩目頓赤少食痰中帶血絲余診其脈左手微而無力右手大而洪數此火症也想已有外務其父母力為分解再三私詢乃曰前學中隔壁窺見一女子覺慕之不遂後得此疾余以當歸地黃茯神遠志牡丹皮酸棗仁白朮甘草桔梗數十劑全愈一人咳嗽短氣余以黃耆為君當歸阿膠陳皮天冬桑白皮知母黃柏數服而愈痰火失血夫血者氣之配也人之一身五臟六腑四體百骸靡不藉其營養也然附氣以行氣暢則暢氣逆則逆有夫婦隨唱之義一或陰虧陽勝偏而為火氣得火而行健譬則男女偕行男得附而邁往女必迷途而暫佇矣所以火載血上錯經妄行越出上竅而為吐衄咳唾等候第始焉之作正氣未虛猶水溢於都固當潔理其源亦必溢土以御不爾而任其流則涓涓之勢其可遏乎非江海之源寧不竭乎況失血既久則真陰已虧相火自熾必見潮汗遺滑等證當此之際法當君以益陽佐以滋陰養血使以清金潔源令陽生陰長源潔流清庶無後慮矣然所謂益陽者參耆獨參湯之類是也所謂滋陰養血者四物知柏玄參之屬是也所謂清金梔芩沙參二冬等味是也所謂理氣者陳皮香附是也所謂兜澀者棕櫚茜根大小薊是也所謂潔源者丹皮鬱金犀角藕汁或童便一物是也要之痰火失血皆由陰火上炎所致然謂之陰火者龍雷之火也不可以水伏不可以直折豈苦寒之可遏耶倘恣用苦寒以傷其脾則飲食日減肌肉日消節齋云服寒者百無一生服溲溺者百無一死之論正此謂也聖按失血之證其類非一有陽乘陰者謂血熱而妄行也有陰乘陽者以陽虛而陰無所附妄溢而不循經也有血越清道而出於鼻者有血溢濁道而出於口者嘔血者出於肝吐血者出於胃衄血者出於肺耳出血曰衈膚腠出血曰血汗口鼻並出曰腦衄九竅俱出曰大衄由固不一總之火病俱多倘不溯其源而以治寧毋岐路亡羊之失乎導瘀散滯緩急之品治諸血暴作妄行不止兼止兼消藕節入藥煎或絞汁同藥服或生藕單服亦可治口鼻諸血此清水潔源之要藥棕灰消瘀血止吐衄咳唾諸血或入藥或單服亦可茜根或銼或絞汁活血行血止吐衄諸血韭汁止吐血消胃脘積血和童便燉溫服萊蔔汁止吐血大衄仍注鼻中蔓菁汁止吐衄乾柿治脾之藥消宿血吐衄鬱金消瘀血止吐衄發灰取瘀血水調服上下諸血亦可吹鼻京墨止吐血磨服所吐血炒黑研末麥門冬湯服三分以血導血所衄血接取點目角或炒末水服一錢人指甲刮末吹鼻止衄諸血主方治陰虛火動血熱妄行吐衄嘔咳咯唾等血生地黃忌鐵二錢治心肺傷損吐血衄血紫參一錢止唾血衄血或同人參末服止吐血丹參一錢消衄血生新血牡丹皮一錢和血生血涼血當歸一錢頭止血身調血尾破血衄血不止末服一錢芎藭一錢消宿血養新血止吐衄白芍一錢散惡血逐賊血平肝助脾咯血不止入犀角汁同服黃芩酒炒一錢諸失血積熱吐衄為末服麥門冬去心一錢五分治心肺積熱吐衄不止或搗汁和蜜單服或同生地黃服梔子消胃脘血止衄炒黑一錢上十味乃滋陰抑陽之要品作一劑水煎臨服入童便一盞藕汁一盞溫服或磨犀角汁同服如證增減無不捷驗若血壅盛當與前清止之品倍用諸血後虛怯主方治吐衄咳唾等證失血既多虛羸昏倦精神怯弱血尚未盡人參一錢補氣生血吐衄後煎服一兩若內傷血出如湧泉同荊芥灰蒸柏葉白麵水服黃耆蜜炒一錢逐五臟惡血同紫蘇末服止吐衄不止甘草炙五分養血補血並咳唾膿血之疾白芨一錢或為末以羊肺蘸食止肺損唾衄水服止衄百合一錢主肺病吐血或和蜜蒸食熟地黃二錢補血填髓生地黃二錢涼血生血止血當歸身頭一錢五分止血養血牡丹皮一錢和血生血涼血退血中伏火阿膠蛤粉炒成珠一錢主虛損吐血肺虛咯血鹿角膠一錢治同上上十味乃補血養血清血歸源之品其間主以參耆者取陰藉陽生之義但脈不實數弦長者任意服之無執王氏謬論以取虛虛之禍也以上作一劑用藕節五個水煎臨服時入童便一盞藕汁二杯俟溫徐徐緩服按褚澄遺書云人喉有竅咳血殺人蓋肺體清虛難容纖物血既滲入愈咳愈滲愈滲愈咳凡諸藥味厚氣濃者皆所不利惟飲童便一物湯則百無一死若服寒涼則百不一生又吳氏云諸虛吐衄咯血須用童子小便其功甚捷蓋溲溺滋陰降火清瘀血止吐衄諸血但取十二歲以下童子絶其烹炮鹹酸多與米飲以助水道每用一盞入薑汁或韭汁三五點徐徐緩服日進二三服寒天則燉溫服久自有效也附吐血簡易良方地黃粥大能利血生精吐血者宜常食之妙用懷慶生地黃以銅刀切二合與粳米二合同入罐中煮之候熟以酥二合白蜜一合同炒香入內再煮熟食一方治內熱吐血用青黛二錢新汲水調服一方治吐血損肺煉成鍾乳粉每三錢糯米湯調下立止一方治吐血不止青柏葉一握乾薑二片阿膠一挺炙水二升煮一升另絞藕汁或童便一盞去渣服一方治恚怒嘔血煩滿少氣胸脅疼痛青柏為散米飲下二三匕一方治吐血衄血白膠香蛤粉等分為末薑汁調下一方治暴卒吐血石灰於刀頭上燒研每二錢用井水調下一方治吐血胸膈刺痛用大黃一兩為散每一錢以地黃汁一合水煎服一方治心熱吐血不止生葛搗汁半升燉服一方治內損吐血飛羅面略炒以京墨汁或藕節汁調服二錢一方治吐血諸藥不效者桃奴燒末米飲下一方治卒暴吐血雙荷散藕節荷蒂各七個蜜少許搗爛水煎溫服或丸服一方治吐血咯血乾荷葉焙乾為末每二錢米湯下一方治吐血敗荷葉為末蒲黃等分每三錢麥冬湯下一方治吐血衄血陽盛於陰血熱妄行宜服四生丸生荷葉生艾葉生柏葉生地黃等分搗爛丸如梧桐子大每水煎一丸服一方治吐血如鵝鴨肝用生犀角生桔梗各一兩末之水服二錢一方治諸失血用梞柴葉濃煎水服或入藥服尤妙附拙見治驗一人患咳吐血余診脈數而有力獨脾脈洪實而緊此煎炒厚味所致乃脾胃二經火也余以陳皮白芷當歸生地黃桔梗甘草白芍黃芩貝母天花粉白茯苓知母黃柏數十劑而愈一農家因救旱過勞忽吐血不止醫作火病治之不效求救於余余以補中益氣湯數服而愈內經所謂勞者溫之正此義也一老人下血不止服止血藥不效余以四物加牡丹皮白朮理脾而愈自汗盜汗夫汗者心之液非大熱過勞而出者則病也由則非一或沖冒風雨濕邪熏蒸郁遏致營衛之氣不和是以腠理開張濈然汗出此外邪之所為惟徹其邪則汗自止若內傷之汗非營虛則衛弱也何則以陰乘陽分自然汗出者曰自汗法當調營以益衛以陽乘陰分睡里汗出者曰盜汗法當滋陰以抑陽若病久而肌脫肉消者晝則自汗蒸蒸夜則盜汗襲襲又屬陰陽兩虛也法當氣血兩益之大都自汗之脈則必微而弱盜汗之脈則必細而澀微主陽氣衰細主陰氣弱王氏之論豈欺我乎要之自汗盜汗乃亡津奪液之肇端但見是證則當警惕以治毋以尋常一例視也聖曰所謂汗為心液者以其心主是液如脾主涎肺主涕肝主淚之類非心竅之真液也蓋以水穀至清之液脾氣散精上歸於肺輸布一身五臟六腑四體百骸靡不藉其營養人所不可一日無者猶水濕於土中淫則浸漬燥則乾枯燥濕相得則滋長萬物矣而其所以為汗者必藉陽氣鼓舞乃生譬則造酒者然以曲谷濕罨置之甑中注水於釜迫之以火則液氣升而為酒矣造酒作汗之理以此喻之若符之合節可異乎夫汗則一也而復有自汗盜汗之異理何致也所謂陽虛陰必湊之抑何別耶以陰乘陽分是營氣不與衛氣諧也陽主動以動中有靜故覺而汗出乃曰自汗法當補陽以養陰蓋補陽者參耆是也養陰者歸地是也陰虛陽必乘之以陽侵陰分是衛氣不與營氣和也陰主靜以靜中有動故寐而汗出乃曰盜汗若盜之潛出覺之即止法當補陰以抑陽蓋補陰者四物是也抑陽者三黃是也若夫晝則自汗而夜盜汗者固為陰陽兩虛然病至於此則醫亦掣肘矣何也衛氣者晝則行陽夜則行陰行陽則寤行陰則寐今也寤寐俱汗是陽動極而陰靜反動總之陰氣已敗而微陽亦自浮越矣時將補其陽則陰火得補而遂熾時欲濟其陰則陽微無以生其陰於斯時也惟脈大虛緩不數者則為陰未甚虛胃氣尚存二法用之或可冀其萬一耳藉使脈來細數無力者則為陰敗陽頽卻倉扁復起又何施耶自汗主方治痰火證具氣虛自汗脈微而緩或大而虛微者宜之或兼夢遺亦宜之黃耆蜜炒一錢瀉肺火益元氣實腠理止自汗人參清河者五分止一切自汗或同當歸豬腎煮食白朮土炒一錢止自汗或同小麥煎服或同黃耆石斛牡蠣術主脾自汗麻黃根八分止諸汗必用或末之外撲知母蜜炒去毛一錢清金止自汗酸棗仁微炒一錢研碎止自汗寧心驚治不眠白茯苓去皮一錢止自汗盜汗並宜或同烏梅湯服若血虛心頭出汗者同艾葉調服柏子仁微炒研碎一錢養心液止汗牡蠣煅研末一錢氣虛自汗血虛盜汗同杜仲酒服虛勞盜汗同黃耆麻黃根煎服龍骨煅研末五分止心驚盜汗熟地黃一錢益陰養陽止汗上十味治自汗之專品惟脈不細數弦長緊實者俱可服也若覺陰火盛者加玄參一錢若兼傷風衛氣不與營氣而自汗者加桂枝三分外以雌雞豬肝羊胃作羹牛羊脂酒服皆有益於汗以尋常作茹食之亦宜盜汗主方治痰火證具陰虛盜汗脈細而數或弦澀虛微者宜之兼夢遺者亦宜當歸身一錢益陰生血止盜汗熟地黃一錢滋腎水益真陰止盜汗白芍藥煨一錢補勞退熱除煩益氣瀉肝安脾止盜汗白茯神去木一錢治同前柏子仁炒一錢研末止心驚盜汗牡蠣粉一錢治同前黃柏蜜炒一錢益腎止汗白朮土炒一錢治同前甘草炙五分瀉陰火補脾止汗黃連酒炒五分除心熱止盜汗麥門冬去心一錢治心煩止盜汗浮小麥微炒一撮止盜汗上十四味治陰虛盜汗之聖藥脈細數者尤宜若盜汗盛者亦加麻黃根五分龍骨五分若盜汗微而本證甚者但俱以本證藥為主如證增減自捷影響附諸方當歸六黃湯治盜汗之聖藥川當歸身一錢五分補血養血生血行血止陰虛盜汗故用生地黃黃芩佐之不絶生化之源要之血藥不容舍此黃柏蜜炒一錢瀉腎火救腎水滋陰降火止盜汗者生地黃砂仁拌蒸一錢五分陰微陽勝相火熾強來乘陰位日漸煎熬凡陰虛火證及盜汗者宜之又佐當歸之能熟地黃一錢補腎水真陰補血養氣止盜汗黃芩蜜炒一錢除腠理間熱養陰退陽盜汗自止又佐當歸之用黃連蜜炒八分潤心肺止盜汗黃耆蜜炒一錢實皮毛益胃氣去肌熱瀉肺火除虛熱除肌中燥濕又治脈弦自汗脈細自汗上六味水煎臨臥服黃耆湯治喜怒驚恐房室虛勞以致陰陽偏虛或發厥自汗或盜汗不止並宜服之黃耆蜜炒一錢五分如上白茯苓去皮一錢保心鎮驚生津止汗熟地黃一錢五分治如上天門冬去心一錢保肺定喘潤肌為熟地黃之使麻黃根八分止汗龍骨煅八分安肺收汗五味子二十粒補腎生津酸能斂收之義浮小麥一錢止汗防風一錢止盜汗自汗當歸身一錢治如上甘草炙五分瀉火補脾止汗上十一味止盜汗自汗之專劑水煎食遠服牡蠣散治諸虛體常自汗驚惕不寧牡蠣左顧者煅一兩黃耆蜜炒一兩麻黃根一兩白朮土炒五錢甘草炙二錢五分浮小麥百粒體虛加白茯苓一兩上為粗末每五錢滾白湯臨臥溫服附宜食諸物豬心若心虛自汗同參耆煮食甚妙豬腎止盜汗産後蓐勞盜汗煮粥食之麥面止盜汗豆豉止盜汗為末酒調服之蒸餅每夜食一枚止盜汗自汗附拙見治驗一書生患盜汗每夜被濕數重開帳其熱氣如霧上騰余以當歸六黃湯加減數十劑略減二三分未全愈診六脈伏沉乃虛之極也加人參七分黃耆加至三倍復以童便煮附子三分一服熱退汗止一半再服而汗證亦愈夢遺滑精夫精者血之粹者也經曰陽平陰祕精神乃治陰陽離決精神乃竭以腎水虛衰心火妄動至水不得寧由是不約而妄遺矣逮溯其所自因則有四何也有夢交而遺者以火動水沸神馳精泄此君不務德亂命所致法當君以養心寧神佐以益腎而斂竅也有下元虛弱精神蕩溢而遺者此腎衰不攝玉關無約而精乃妄泄法當君以補腎佐以澀精也有年壯氣盛久節房事致經絡壅滯而遺者此久曠精滿而溢惟得泄而自平也有情動於中所願不遂而遺者惟通其情而自止即勿藥可也四者之中惟夢遺最酷蓋勞神而復脫其精痰火之機多肇於此可例視乎聖謂營氣之粹者化而為精聚於命門命門者精血之府也經曰男子二八而陽精升約滿一升二合養而充之可得三升損而喪之不及一升謂精為峻者精非血不化也謂精為寶者精非氣不養也故血盛則精長氣聚則精盈譬則海水之潮亦由天地間之陽氣鼓舞所以氣血精三者同源而異流殊途而同歸者也期嗣真詮亦曰精即血成試以精置盤中以鹽點之一宿即化而為血豈非反本還元之義與愚謂血之為精猶硃砂中之取汞也法置砂入鼎中以火迫之其汞乃出夫婦交媾必動淫火而精乃泄故丹家以汞鉛譬之精血正此義矣然精固營之粹者也而腎中一點真水則胎於無極生於太極有形有質難成易虧男女均有此物所以男女過欲皆能致水虧而成陰虛火動之症其義可見矣所謂二八而精滿者無乃飲食厚味之液所變之濁陰澄祕者復藉肺氣輸歸於腎若酒之攙水然必藉本浮之氣味乃能充盈故富貴之人雖縱淫酒色未嘗一一而成痰火之病蓋以日食葷濃之味故輸化之精亦多雖頻泄亦未即渴若夫天一之真精則父母先天所成為人身之至寶可頻而妄泄乎倘無厚味精液之助猶酒之真浮可頻費而妄耗乎若藜藿如膏粱之縱欲其有不病者亦鮮矣況夢遺一證於縱欲勞神遂致坎離不交水火未濟勞神奪精心不御神腎不攝精心神蕩溢由是一夢而遺其酷於諸遺者以此法宜瀉南方補北方益真火壯真水庶得病情之奧遺精主方治心神不足夜多淫夢火伏水中水不得寧一夢即遺者此心腎不交水火未濟實痰火之肇端也宜此主之人參取清河的五分白茯神去木一錢熟地黃一錢忌鐵山茱萸取肉三錢肥遠志去心一錢淮山藥一錢五味子十五粒酸棗仁微炒一錢肉蓯蓉酒洗去甲一錢補骨脂微炒八分芡實肉一錢蓮化須五分鮮知母去毛淡鹽水炒過一錢覆盆子一錢麥門冬去心一錢上十五味作一劑空心服乃養心血寧心志益神氣補腎精泄腎火固玉關之專品此藥不燥不寒不妨肺腎不助陰火誠痰火之王道也若夢遺甚者必專服之若更遺甚者或入金櫻膏同服或加牡蠣或加龍骨若脈實數弦長或澀數而細此不受補者去人參補骨脂加當歸生地黃黃連芡實末每兩入龍骨一錢五分或用金櫻膏糊丸間服水陸二仙丹此標本兼治之藥也附諸方龍齒補心湯治諸不足血虛潮熱心神驚怖睡臥不寧盜汗夢遺小便赤濁煩躁不安等證龍齒煅研一錢本劑化服人參五分熟地黃一錢五分川歸身一錢桔梗一錢酸棗仁微炒研細白茯苓去皮一錢白茯神去木一錢麥門冬去心一錢綿黃耆蜜炒一錢遠志取肉八分半夏曲八分白朮土炒一錢甘草炙五分原有枳殼桂心似不切病情今摘之上十四味作一劑入粳米一撮薑汁水煎空心服清心蓮子飲治發熱煩躁七情抑鬱小便白濁或有沙淋夜夢走泄遺瀝澀痛或赤或白酒色過度上盛下虛心火上炎肺經受克故口乾燥漸成消渴四體倦怠男子五淋婦人帶下五心煩燥此藥溫中清心養神祕精黃芩蜜炒一錢補膀胱寒及滋化源麥門冬去心一錢補心氣不足退勞傷客熱地骨皮一錢益精氣瀉腎火退肝腎虛熱又去胞絡中火車前子一錢養肝肺強陰益精血導小腸熱久服耐老輕身甘草五分瀉火熱通九竅利百脈益精養氣補脾胃白茯苓一錢補五勞及七傷滲濕利竅黃耆蜜炒一錢治虛勞自汗補肺氣瀉肺火心火治丈夫虛損五勞瘦弱瀉陰火除虛熱補脾氣人參五分補五勞七傷虛損瘦弱瀉心肺脾胃中火邪安精神定魂魄止驚悸保中守神又御精石蓮肉去心一錢安心澀精交心腎安靖上下君相火邪上九味作一劑水煎食前服有熱加柴胡薄荷芡實丸治思慮傷心疲勞傷腎心腎不交精元不固面無顏色驚悸健忘夜夢不寧小便赤澀遺精白濁足胵痠痛耳聾目昏口乾腳弱芡實取生肉二兩益腎固精補脾蓮鬚一兩清心通腎固精茯神去木一兩止驚悸又開心益志安魂魄寧亂神祕精髓虛而小便不利者加而用之山茱萸取肉二兩補腎氣添精髓止小便不禁養精氣取其味酸澀以收祕滑也龍骨煅研五錢治心腹鬼忤鬼疰養精神逐邪氣安心神止夜夢鬼交虛而多夢益腎鎮驚五味子黑者一兩治腎虛遺精韭子五錢益腎壯陽止泄精止虛勞夢泄肉蓯蓉一兩止精泄遺瀝熟地黃二兩填骨髓生精血補五臟滋腎水真陰紫石英火煅研五錢益肝鎮心牛膝酒洗去蘆二兩專治男子消陰老人失溺補中續絶利陰氣填骨髓助十二經脈枸杞子一兩補虛勞益精氣滋腎潤肺上末酒煮山藥糊丸梧子大每七十丸淡鹽湯下心腎丸治水火不既濟心下怔忡夜多盜汗便赤夢遺牛膝去蘆酒洗二兩熟地黃二兩忌鐵肉蓯蓉一兩菟絲子酒蒸二兩鹿茸去毛臥炙二兩人參一兩黃耆蜜炙一兩五味子一兩茯神去木二兩山藥焙二兩當歸身二兩龍骨煅五錢遠志去心一兩上為末另以山藥末糊為丸梧子大每七十丸空心淡鹽湯下附捷方男子夜夢鬼交精泄巴戟天煎丸並良心虛夢泄或白濁白茯苓末每服二錢虛滑遺精白茯苓二兩宿砂五錢為末入鹽二錢精羊肉批開摻藥炙食以酒送下漏精白濁小便數多白茯苓山藥礬水煮過等分為末每飲服二錢心虛遺精豬心一個批開相連以飛過硃砂末摻入線縛煮熟食之夢遺減食白色苦參三兩白朮五兩牡蠣四兩為末用雄豬肚一具洗淨砂罐煮爛石臼搗和藥干則入汁丸小豆大每四十丸米湯下日三服久服身肥食進而夢遺立止腎虛遺精北五味子一斤洗淨水浸挼去核再以水洗核取盡餘味通置砂鍋中布濾過入好冬蜜六斤炭火慢熬成膏瓶收五日出火毒每空心服一二匙固精強骨金毛狗脊白茯神遠志蓮肉當歸等分為末蜜丸梧子大每五十丸酒下遺精品類有心虛腎虛脫精濕熱心虛清河參補五臟安精神定魂魄又止驚悸斷淫夢保中守神遠志利九竅益智慧隱耳目聰明定志益精氣安魂魄又益精補陰氣止虛夢遺菟絲子添精益髓補五勞七傷鬼交泄精肝臟風虛蓮鬚補心通腎固精蓮子心主遺精或入硃砂末服硃砂主心虛遺精或入豬心煮食紫石英補不足定驚悸安魂填下焦止消渴養肺氣手少陰足厥陰血分藥也上能鎮心重可以去怯也下能益肝濕可以去枯也生心血養肝臟血也其性緩而能補故心神不安肝血不足宜之石蓮肉補五臟不足傷中益十二經脈血氣定心澀精多食令人生喜交心腎厚腸胃固精氣強筋骨補虛損利耳目除男子白濁女人帶下崩中諸血病安靖下上君相火邪茯神心神驚掣虛而善忘風眩心虛茯神治心病然茯苓亦未嘗不治心病也赤入血分白入氣分之不同腎虛巴戟天夜夢鬼交精泄肉蓯蓉五勞七傷補中氣益精髓悅顏色延年大補男子泄精血遺澀女子帶下陰痛山藥益腎氣止泄精為末酒服亦可補骨脂主骨髓傷敗冷精流或同青鹽末服五味子腎虛遺精或熬膏常服覆盆子安和五臟補虛勞腎精虛竭益腎臟縮小便狗脊固精強骨益男子或同遠志茯神當歸丸服韭子宜腎壯陽止泄精為末酒服止虛勞夢泄或醋煮丸濕熱半夏腎伏濕熱不能管攝精血妄遺與下虛不同宜此或用豬苓炒過同牡蠣丸服蘇子夢中失精炒研末服澤瀉滲濕通淋補陰不足黃柏積熱心怔夢遺入片腦丸服牡蠣夢遣便溏為末或入劑或醋糊丸服蛤蜊粉爛蜆殼田螺殼真珠並主遺精脫精芡實益腎固精或同茯苓秋石丸服金櫻子固精熬膏或入劑或為糊丸服益智仁治夢泄或同烏藥山藥丸服山茱萸益精安五臟通九竅止小便多補腎氣添精髓止老人尿多固祕精氣取其味酸以收滑龍骨多寐泄精小便泄精同遠志丸服亦同蘇子末服龍齒安魂定魄澀精鎮驚桑螵蛸男子虛損晝寐泄精或同龍骨末服鹿茸男子腰腎虛夜夢鬼交精溢自泄或末之酒服方寸匕或煎酒服鹿角水磨服或入藥止脫精夢遺丸服主婦人夢鬼交精自出鱉甲治陰虛夢遺或燒末酒服白膠虛遺酒服之阿膠腎虛失遺酒服狗頭骨灰夢遺酒服附宜食雞膍胵黃雌雞烏骨雞豬腎豬心獐肉胡桃櫻桃附拙見治驗一書生夢遺精滑世人多作腎虛不效余將清心蓮子飲加知柏龍骨牡蠣萆薢或再加菟絲而愈一童子夢遺不止余以二陳加減除胃中濕痰後以清心蓮子飲數服而愈一男子遺精白濁口乾作渴大便中澀午後熱甚用補中益氣加芍藥玄參加減六味丸而愈火病脅痛夫左脅者肝之部位也竊見患痰火者往往多左脅痛此蓋由性燥暴而多怒怒傷肝故作患也丹溪云左脅痛肝火盛有氣實有死血右脅痛者有痰流注蓋右脅者乃肺之部位也肝急氣實須用蒼朮川芎青皮當歸之類痛甚者肺火盛以當歸龍薈丸薑湯下是瀉火之要藥死血用桃仁紅花川芎加之以辛涼之劑以治之余治吾儒病痰火者多見此症由作文寫字多以左脅伏桌倦後盡力倚靠暫不見傷久則脅痛乃胸前死血作梗也於主方中加紅花一錢其效如神再於熟藥內摻入童便韭汁各少許搗勻溫服更效右脅痛微者即是痰流注並食積每用鹽煎散順氣丸辛溫之劑以治之也又嘗論左脅痛胃脘疼婦人多有之蓋以憂思忿怒之氣不得條達故作痛也治婦人諸疾必以行氣開鬱為主兼以破結散火庶得機矣語云香附縮砂女人之至寶山藥蓯蓉男子之佳珍此之謂也左脅痛主方當歸龍膽草大梔子童便炒黃連炒黃芩各一兩大黃九蒸蘆薈各半兩木香一錢五分黃柏二兩麝香五分上為末麵糊為丸一方性暴者加柴胡川芎青黛蜜丸附諸方一香散治右脅痛神效小茴香一兩炒枳殼五錢麵炒為末以鹽酒調服二錢加味二陳湯治咳嗽脅痛陳皮去白半夏薑泡茯苓去皮南星牛膽制者佳香附去毛童便炒青皮去白青黛薑汁各等分各等分煎服抑青丸治右脅痛神效黃連半斤為末蒸餅糊為丸服大端痰火之症多患左脅痛痛甚至臥不可轉側者乃肝經無葉其葉已焦多死不救附拙見治驗一人右脅痛盛余診其脈六部帶滑此痰流注作痛也遂用陳皮一錢半夏制七分香附童便炒五分大腹皮洗五分蒼朮浸五分厚朴薑炒五分枳殼三分半片子薑黃四分神麯炒五分麥芽炒五分服數劑而愈驚悸怔忡健忘驚者心卒動而不寧也悸者心跳動而怕驚也怔忡者心中躁動不安惕惕然如人將捕是也多因富貴而戚戚貧窮而不遂所願而成健忘者陡然而忘其事盡心竭力思忖不來為事有始無終言談不知首尾其三症病同而名異其原皆由心血虛蓋心無血養如魚失水惕然而跳躍也時作時止者以痰因火動瘦人多是血虛肥人多是痰飲法宜先養心血理其脾土亦當幽間安樂制其憂慮遠其七情六淫則自安矣素問云東方青色入通於肝其病發驚駭又云脾移熱於肝則為驚衄仲景云食少飲多水停不下甚者則悸微者短氣又云五飲停蓄閉於中脘最使人驚悸又云因有大事所驚而成者名曰心驚膽寒病在心膽經其脈大動其動也如豆動搖無頭尾是也丹溪云病自驚而得者則神出其舍捨得液則成痰也血氣入舍則痰拒其神不得歸焉黃帝問曰胃足陽明之脈病惡人與火聞木音則惕然而驚若聞鐘鼓而不為動何也岐伯曰陽明者胃脈也胃者土也故聞木音而驚土畏木也又曰痰飲驚悸屬脾土凡火病吐血盜汗後多見此症故並附之驚悸怔忡主方即補心湯當歸一錢白朮八分壁土炒陳皮五分去白白芍五分炙生地七分遠志五分去骨石菖蒲六分麥冬七分去心酸棗仁五分略炒甘草三分半黃柏三分童便炒知母五分童便炒茯神五分去木虛極者加人參三分又一方加柏子仁北五味水煎服硃砂安神丸硃砂三錢水研末黃連酒洗六錢甘草炙二錢五分生地黃一錢五分當歸二錢上為細末蒸餅為丸如黍米大每服三五十丸臨臥津液下附名醫治驗林學院歷官海南地方有一子甚聰敏喜食海蛤每食必設至十八年忽面色頓青形體消瘦夜多驚悸皆謂癆瘵百療不瘳遂召杜診之杜曰非病何以知之蓋雖病削麵青精神不減問秀才平日好食甚物曰多食海南中味杜曰但多服生津液藥病當自愈如是經兩月顏色漸紅潤夜亦無驚學士延杜問曰願聞此病所以杜曰素問云鹽發渴乃勝血之證今既去鹽用生津液之藥人且少壯血液易生而色漸紅潤此病去乃安矣衆醫以癆瘵非其治也衛德新之妻旅宿樓上夜值盜劫人燒舍驚墜床下自後每聞有響則驚倒不知諸醫作心病治之皆無效戴人見而斷之曰驚者為陽從外入也恐者為陰從內出也驚者為自不知也恐者為自知也足少陽膽經屬肝木膽者敢也驚怕則傷膽矣乃命侍女執其兩手按於高椅上坐當面前下置一小几戴人云娘子當視此一木猛擊之其婦人大驚戴曰我以木擊幾何必驚乎伺少停擊之驚少緩又須臾連擊三五次又杖擊門又遣人擊背後之窗徐徐驚定衛嘆曰是何治法戴人曰驚者平之平者常也常見必無驚是夜使人擊其門窗自昏暮達曙熟臥不聞矣驚者神上越也從下擊幾使之下視所以收神也十二日後雖聞雷亦不驚
