body:
  text: 卷三六味丸方論六味丸古人制以統治痰火諸證又謂已病未病並宜服之此蓋深得病之奧者也何則痰火之作始於水虧火熾金傷絕其生化之源乃爾觀方中君地黃佐山藥山茱使以茯苓牡丹皮澤瀉者則主益水清金敦土之意可知矣蓋地黃一味為補腎之專品益水之主味孰勝此乎夫所謂益水者即所以清金也惟水足則火自平而金自清有子令母實之義也所謂清金者即所以敦土也惟金氣清肅則木有所畏而土自實有子受母蔭之義也而山藥者則補脾之要品以脾氣實則能運化水穀之精微輸轉腎臟而充精氣故有補土益水之功也而其山茱茯苓丹皮皆腎經之藥力助地黃之能其澤瀉一味雖曰接引諸品歸腎然方意實非此也蓋茯苓澤瀉皆取其瀉膀胱之邪古人補藥則必兼瀉邪邪去則補藥得力一闢一闔此乃玄妙後世不知此理專一於補所以久服必致偏勝之害六味之設何其神哉經有亢則害承乃制之論正此謂也謹按諸品性能贅之分兩之下以備學者之參考焉六味丸治男子五勞七傷精血虧損夢遺盜汗咳嗽失血骨蒸潮熱虛羸瘦悴等證又治女人傷中胞漏下血瘀血諸候一切痰火已病未病並皆治之懷乾地黃制八兩即生地黃之乾者其法取懷慶者一斤擇肥者半斤洗淨曬令微皺以採下者洗淨木臼中搗絞汁盡更搗取汁拌前地黃日中曬或火烘乾惡銅鐵器為末聽用其性氣味甘寒無毒主治男子五勞七傷補五臟內傷不足通血脈利耳目益氣力助心脾氣強筋骨長志安魂定魄治心肺損吐血衄血涼血生血補腎水真陰填骨髓長肌肉生精元素曰生則大寒而涼血血熱者須用之熟則微溫而補腎血衰者須用之又臍下痛屬腎非熟地黃不能除乃通腎經之藥也又曰益腎水涼心血其脈洪實者宜之里脈虛者則宜熟地黃假火力蒸九數故能補腎元氣仲景六味丸用之為諸藥之首天一生水之源也湯液四物湯治藏血之臟以之為君者癸乙同歸一治也又曰男子多陰虛宜用熟地黃女子多血熱宜用生地黃又云生地黃能生精血天門冬引入所生之處熟地黃能補精血用麥門冬引入所補之處虞氏云生地黃生血而胃氣弱者服恐妨食熟地黃補血而痰火多服之多者恐泥膈也或云生地黃酒炒則不妨胃熟地黃薑汁炒則不泥膈此皆善用地黃之精微者也山茱萸肉酒潤去核只取肉四兩氣味鹹平無毒補腎氣壯元氣秘精氣助水臟暖腰膝興陽道堅陰莖添精髓止老人尿多不節益精安五臟通九竅久服明目強力輕身延年王氏曰滑則氣脫澀則所以收之山茱萸止小便利秘精氣取其味酸澀以收滑也仲景八味丸用之為君其性可知矣干淮山藥四兩另末氣味甘溫平無毒主治傷中補虛羸去寒熱邪氣補中益氣力長肌肉強陰久服耳目聰明輕身不飢延年下氣止腰痛治虛勞羸瘦充五臟除煩熱補五勞七傷除冷風鎮心神安魂魄補心氣不足開達心孔多記事強筋骨主泄精健忘益腎氣健脾胃止泄痢化痰涎潤皮毛凡人體虛而羸者加而用之又曰利丈夫助陰力熟煮和蜜或為湯煎或為粉並佳干之入藥更妙惟不宜同麵食東垣曰山藥入於太陰仲景八味丸用乾山藥以其涼血能補也亦治皮膚乾燥以此潤之吳氏曰山藥入手太陰二經補其不足清其虛熱肚肺為腎之上源源既有滋流豈無益此八味丸所以用其強陰也又云食之可以避霧露香牡丹皮用真者去骨令淨三兩微焙忌鐵或曬乾以銅刀切加酒拌蒸從已至未日乾聽用氣味辛寒無毒忌蒜椒姜治五勞勞氣神志不足無汗之骨蒸衄血吐血補血生血涼血治血中伏火除煩熱女子經脈不通血瀝腰痛通關腠血脈元素曰牡丹乃天地之精為群花之首葉為陽發生也花為陰成實也丹者赤也火也故能瀉陰胞中之火四物湯加之治婦人骨蒸又曰牡丹皮入手厥陰足少陰治無汗骨蒸神不足者手少陰志不足者足少陰故八味丸中用之治神志不足也又能治腸胃積血吐血衄血必用之藥故犀角地黃湯用之李氏曰牡丹皮治手足少陰厥陰四經血分伏火蓋伏火即陰火也陰火即相火也古方惟以治相火故腎氣丸用之後人乃專以黃柏治相火不知牡丹皮之功更勝也此乃千載秘奧人所不知今為拈出赤花者利白花者補人亦罕悟宜分別之云白茯苓去皮三兩氣味甘平無毒調臟氣伐腎邪長陰力保神氣開胃止嘔逆安心神主肺痿痰壅心腹脹滿補五勞七傷開心志止健忘止渴利小便除濕益燥和中益氣瀉膀胱益脾骨治腎積奔豚丹溪曰陰虛者不宜用新澤瀉去根一兩五錢原三兩今減之氣味甘寒無毒主腎虛精自瀉治五淋宣通水道入腎經去舊水養新水利小便滲濕熱行痰飲養五臟益氣力肥健消水久服耳目聰明不飢延年輕身面生光能行水上補虛損五臟痞滿起陰氣止泄精消渴淋澀逐膀胱三焦停水元素曰澤瀉乃除濕之聖入腎經治小便淋澀去陰間汗無此疾服之令人目盲宗氏曰澤瀉功長於利水扁鵲曰多服病人眼誠為行去水也丸服澤瀉教人未有不小便多者小便既多腎氣安得復實今人止泄精多不敢用之八味丸用之不過接引桂附等歸就腎經別無他意本經曰久服明目扁鵲曰久服昏目何也易老曰去脬中留垢以其味鹹能瀉伏水故也瀉伏水去留垢故明目小便利腎經虛故昏目王履曰宗氏之說王氏韙之竊謂八味丸以地黃為君余藥佐之非止補血兼補氣也所以陽旺則能生陰血也又按本草正誤謂弘景曰仙經服食斷谷皆用之亦云輕身能步行水上頌曰仙方只單服澤瀉一味搗爛篩末水調日服六兩百日體堅而健行李氏曰神農書列澤瀉於上品復云久服輕身面生光能行水上典術云澤瀉久服能令人輕身日行五百里走水上一名澤芝陶蘇皆以為是然愚竊疑之澤瀉行水瀉腎久服且不可又安有此神功耶其謬可知孟子曰盡信書不如無書大抵六味丸用之無乃伐腎邪而已若以之配茯苓丹皮各三兩恐走瀉太甚余故減半俟後之明哲以為何如上六味各為法制另末用白蜜四兩煉熟以前山藥末攪成干糊為丸如梧子大每百丸清晨滾白湯或淡鹽湯下日二服若既病痰火諸證悉具者余加麥門冬二兩五味子一兩若相火熾盛咽乾口燥余加黃柏知母各蜜炒二兩大造丸方論吳球云紫河車即胞衣也兒孕胎中臍繫於胞胞系於母命門受母之蔭父精母血相應生成真元所鍾故曰河車雖寓後天之形實得先天之氣超然非他金石草木類之可比每每用此得效用之女人尤妙蓋本其自出各從其類也若無子及多生女並月水不調小產難產人服之必主多子危疾將絕者一二服可更活一二日其補陰之功極重百發百中久服耳聰目明鬚髮烏黑延年益壽有奪造化之功故名大造丸用紫河車一具男用女胎女用男胎初生者米泔洗淨新瓦焙乾研末或以淡酒蒸熱搗曬研末氣力尤全且無火毒敗龜板年久者童便浸三日酥炙黃二兩或以童便浸過石上磨淨蒸熟曬研尤妙黃柏去皮鹽酒浸炒一兩半杜仲去皮酥炙一兩半牛膝去苗酒浸曬一兩二錢肥生地黃二兩半入砂仁六錢白茯苓二兩絹袋盛入瓦罐酒煮七次去茯苓砂仁不用杵地黃為膏聽用天門冬去心麥門冬去心人參去蘆各一兩二錢夏月加五味子七錢各不犯鐵器為末同地黃膏入酒米糊丸如小大豆每服八九十丸空心鹽湯下冬月酒下女人去龜板加當歸二兩以乳煮糊為丸男子遺精女人帶下並加牡蠣粉一兩世醫用陽藥滋補非徒無益為害非小蓋邪火只能動欲不能生物龜板黃柏補陽補陰為河車之佐加以杜仲補腎強腰牛膝益精壯骨四味通為足少陰經藥名補腎丸也生地黃涼血滋陰得茯苓砂仁同黃柏則入少陰白飛霞以此四味為天一生水丸也天門冬能保肺氣不令火炎使肺氣下行生水然其性有降無升得人參則鼓動元氣有升有降故同地黃為固本丸也又麥門冬人參五味子三味名生脈散皆為肺經藥此方配合之意大抵以金水二臟為生化之源加河車以成大造之功故也一人病弱陽事敗痿服此二料身體頓異連生四子一婦年六十已衰憊服此壽至九十猶強健一人病後不能作聲服此氣壯聲出一人病痿足不任者半年服此後能遠行痰火雜症補遺頭痛眩暈夫頭為諸陽之首左腦痛屬風與血虛風薄荷荊芥血虛川芎當歸右腦痛屬痰蒼朮半夏屬熱酒芩為主痛甚者屬火黃芩玄參頭痛須用川芎如不愈各加引經藥太陽川芎陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳茱萸如苦頭痛必加細辛頂顛痛須用藁本減川芎如血氣兩虛頭痛調中益氣湯內加川芎三分蔓荊子三分細辛三分其效如神大抵痰火頭痛眩暈因火與痰者多宜加玄參酒芩以清熱勿輕用川芎蔓荊子陳茶為引更穩肩背及腰節痛肩背痛不可回顧者此太陽氣鬱而不行也以風藥散之脊痛項強腰似折項似拔者此是太陽經不通也肢節痛須用羌活如瘦人肢節痛是血虛宜四物湯內加羌活防風酒炒黃芩黃柏如倦怠無力肢節痛加黃耆人參耳鳴及耳聾耳聾皆屬於熱須用四物湯降火耳鳴必用龍薈丸食後服大抵此症因平昔飲酒厚味上焦素有痰火只作清痰降火治之為當余治耳鳴耳聾每服還少丹一料最效方見虛損方古庵曰左耳聾婦人多有之以其多忿怒故也右耳聾者男人多有之以其多色欲故也左右俱聾者膏粱之家多有之以其多肥甘故也腰痛經曰腰以下皆屬腎主濕熱腎虛瘀血積痰挫閃脈大者腎虛杜仲龜板酥炙黃柏知母枸杞北五味之類為末豬脊髓和丸服脈澀者瘀血用補陰丸加桃仁紅花脈緩者濕熱蒼朮杜仲黃柏川芎之類痰積者二陳加南星半夏凡諸症屬火不可峻用寒涼藥腰痛必用鹿角膠痞脹如稟受素弱轉運不調飲食不化而心下痞者宜用白朮山楂神麯陳皮心下痞須用枳實黃連如肥人心下痞乃是濕痰宜蒼朮半夏砂仁茯苓滑石如瘦人心下痞乃是濕熱宜枳實黃連葛根升麻挾血成窩囊而痞者用桃仁紅花香附山梔子大黃之類吞酸乃濕熱積於脾而出伏於肺胃之間必以吳茱萸炒黃連為君用二陳加此二味冬月倍吳茱萸夏月倍黃連為丸薑湯下嘈雜噁心嘔吐嘈雜者火動其痰也宜二陳加黃芩青黛噁心者無物無聲心中欲吐不吐者是實非心經之病皆在胃口上宜用生薑佐諸藥能開豁胃痰也嘔吐者胃中有熱膈上有痰二陳湯加炒山梔黃連生薑喘及短氣氣虛短氣而喘甚者不可用苦寒藥火氣盛故也宜導痰湯千緡湯見局方陰虛自汗小腹火起衝於上喘者宜降心火補陰有火痰者宜降心火清肺金諸喘不止者用椒目研末生薑湯調下一二錢劫止之後因痰治痰因火治火又法以蘿白子蒸熟為君皂角燒灰等分共為末生薑汁煉蜜丸每五七丸噙化止之氣虛氣短者用人參蜜炙黃柏麥冬地骨皮之類治喘症必用阿膠戴云痰喘者喘便有痰聲氣急喘者呼吸急促而無痰聲有胃氣虛喘者抬肩擷項喘而不休火炎上喘者乍進乍退得食則減食已則喘大抵有實火膈上有稠痰凡喘症上喘下必脹要識標本先喘而後脹者主於肺則喘為本而腫為標治當清肺降氣為主而行水次之先脹而後喘者主於脾蓋脾土既傷不能制水則邪反侵肺氣不得降而生喘此則腫為本而喘為標治當實脾行水為主而清肺次之煩躁起臥不安睡不穩謂之煩法宜清肺去痰宜梔豉湯竹葉石膏湯二方見傷寒門躁者顛狂恍惚之狀宜硃砂安神丸見局方諸虛百損頭目昏花四肢疲軟無力羸瘦不長肌肉少年氣血兩虛色欲過度耳鳴者宜服補陰丸甚者大補陰丸六味地黃丸更穩或瓊玉膏中年氣血兩虛者宜十全大補湯天王補心丹老年血氣虛損者宜古庵心腎丹還少丹上諸方俱見古方括內諸症補遺大都痰火症中所必有者採擇數款亦須以主治方中隨所見症依經絡量加一二味以治其標可也其間有闕略者以俟後之君子參補焉痰火死症一痰火嘔血成盆而過多者不思飲食肌肉漸削者此心氣已絕死不治一痰火左脅痛不能轉身者此乃肝葉已干名為乾血痛肝經已絕死不治右脅痛服清肺化痰藥不止夜不能臥者此肺絕之候不治一痰火喉痛此膽火上炎用治喉藥不效至生瘡破皮乃蟲攻咽此瘵疾之不可救者死不治一痰火聲啞乃肺經已絕死不治一痰火臀尖無肉此脾經已絕死不治一痰火咳逆吐食者此胃火熾甚脾氣受傷多致不救一痰火泄瀉飲食不化此胃氣已絕死不治痰火脈按痰火之脈以浮而芤濡虛緩遲大無力沉而遲澀結代無力皆虛而不足外證自汗短氣喘促或肢厥者皆屬脾肺腎三臟俱虛脈合其證此受補者也若脈來弦長緊實外證痰實氣壅喘咳或煩或熱或咽痛或復見諸血此為陰虛火動脈不合證此不受補者也又按脈經曰骨蒸發熱脈數而虛熱而澀小必殞其軀又曰勞極諸虛浮濡微弱土敗雙弦火炎急數又曰諸病失血脈必見芤緩小可喜數大可憂又曰病熱有火洪數可醫沉微無火無根難醫此皆言脈證之宜忌也凡有干於痰火癆瘵之脈悉詳附之於後惟不切於此證者乃摘之浮浮脈法天有輕清在上之象在卦為乾在時為秋在人為肺又曰毛太過則中堅旁虛如循雞羽病在外也不及則氣來毛微病在中也脈訣言尋之如太過乃浮兼洪緊之象非浮脈也主病浮脈為陽主表有力表實無力表虛浮遲中風浮數風熱浮緊風寒浮緩風淫浮虛傷暑浮芤失血浮洪虛熱浮散勞極寸浮主頭痛眩暈或風痰在胃關主土衰木旺尺主後便不通沉沉脈法地有淵泉在下之象在卦為坎在時為冬在人為腎又為石亦曰營太過則為彈石按之益堅病在外也不及則氣來虛微去如數者病在中也脈訣言緩度三關狀如爛綿者非也沉有緩數各部之沉爛綿乃弱脈非沉也主病沉脈主裡有力裡實無力裡虛沉則為氣沉澀氣鬱沉弱寒熱沉緩寒濕沉緊冷痛沉牢冷積寸沉痰鬱水停胸膈關沉主中寒腹痛尺沉主遺精白濁泄痢腎虛腰痛遲遲為陽不勝陰故陰至不及脈訣言重手乃得是有沉無浮一息三至甚為易見而曰隱隱狀且難是澀脈矣其謬可知然二至為遲有力為緩無力為澀有止為結遲甚為敗浮而軟為虛黎氏曰遲小而實緩大而慢遲為陰盛陽虛緩為衛盛營弱宜別之主病遲脈主臟有力冷痛無力虛寒浮遲表寒沉遲裡寒且主多痰沉痼癥瘕寸遲則上焦有寒關遲則中寒腹痛尺遲則後便不禁腎虛腰痛數數為陰不勝陽故脈太過一息六至是也浮沉遲數脈之綱領也數而弦為緊流利為滑數而有止為促數甚為極數見關中為動脈主病數脈主腑有力為實為熱宜瀉無力為虛火為相火宜補浮數表熱沉數里熱氣口數實病肺癰數虛為肺痿寸數咽腫口舌生瘡吐血咳嗽或肺生癰關數胃火肝火尺數則腎虛宜滋陰降火滑滑為陰氣有餘故脈來流利如水脈者血之腑也血盛則脈滑故腎脈宜之氣盛則脈澀故肺脈宜之脈訣云按之即伏三關如珠不近不退是不分浮滑沉滑尺寸之滑也今正之主病滑脈為陽主元氣虛衰痰飲宿食吐逆蓄血女子經調有孕寸滑主膈痰嘔吐吞酸舌強或咳嗽關滑主宿食肝脾積熱尺滑則瀉痢㿗淋又曰滑主痰飲浮滑風痰沉滑食痰滑數痰火滑短宿食脈訣言關滑胃寒尺滑臍冷與脈經言關滑胃熱尺滑血蓄婦人經病之旨相反其謬如此澀澀為陽氣有餘氣盛則血少故脈蹇滯而肺脈宜之脈訣言指下尋之似有舉之全無脈經所云絕不相干又曰細而遲短往來難短且散一止復來參互不調如輕刀刮竹如雨沾沙如病蠶食葉又曰細遲短散時一止曰澀極細而軟重按若絕曰微浮而柔細曰濡沉而柔細曰弱主病澀主血少傷精反胃亡陽多汗營中寒濕入營血痹婦人非孕即無經寸澀主心傷胸痛關則胃虛脅脹尺為精血俱傷腸結溲淋或為下血又曰澀主血少傷精之病女人有孕為胎病無孕為敗血杜氏曰澀脈獨見尺中形同代為死脈大脈形寬大有力為洪大而無力為虛主病大則病進為元氣之賊浮大表病沉大里病惟緩而大則為正脈也緩緩脈小駃於遲一息四至如絲在經不卷其軸應指和緩往來甚勻如初春楊柳舞風之象如風輕沾柳梢緩脈在卦為坤在時為四季在人為脾陽主陰尺上下同等浮大而軟無有偏勝者平脈也若非其時則為有病緩而和平不浮不沉不徐不疾者即有胃氣故杜氏云欲知死期何以取先賢推定五般土陽土須知不過陰陰土過陰當細數主病緩脈主營氣衰衛氣有餘或風或濕或脾虛上主項強下主痿痹寸緩主項背拘攣關主風暈胃家虛弱尺主濡泄或風秘腳弱無力又曰浮緩為風沉緩為濕緩大風虛緩細濕痹緩澀脾虛緩弱風氣脈訣言緩主脾熱口臭反胃齒痛夢鬼之病出自杜撰與緩無關芤浮大而軟按之中空兩邊實又曰中空外實狀若慈蔥劉氏云芤脈何似絕類慈蔥指下成窟有邊無中戴氏云營行脈中脈以血為形芤脈中空脫血之象也又曰芤形浮大軟如蔥按之旁有中央空火犯陽經血上溢熱侵陰絡下流紅脈經云三部芤脈長病得之生卒病得之死脈訣云兩頭有中間無是脈斷絕矣又言主淋澀氣入小腸與失血之候相反誤世不小主病寸主胸中積熱關主腸內生癰尺主下血赤淋紅痢崩中濡濡脈極軟而浮細如帛在水中輕手相得按之無力如水上浮漚謂如帛浮水中重手按之隨手沒之象脈訣按之似有舉之還無是微脈非濡也又曰濡形浮細按須輕水面浮綿力不禁病後產中猶有藥平人若見是無根浮細而如綿曰濡沉細如綿曰弱浮而極細曰微沉而極細不斷曰細主病濡主亡血陰虛丹田髓已虧盜汗血崩濕氣侵脾寸濡主陽微自汗關主氣虛尺主傷精脫血寒甚法宜溫補大都濡主血虛之病又為傷濕弱極軟而沉按之乃得舉手全無又曰弱乃濡之沉者脈訣言黎氏譬如浮漚皆是濡非弱也素問曰脈弱以滑是有胃氣脈弱以澀是為久病病後老弱見之順平人少年見之逆又曰弱來無力按之柔柔細而沉不見浮陽陷入陰精血弱白頭猶可少年愁主病弱脈主陰氣虛陽氣衰惡寒發熱筋骨痿軟多驚多汗精神減少法當益氣調營寸主陽虛關主胃弱脾衰尺主陽陷陰虛又曰弱主氣虛之病仲景曰陽陷入陰故惡寒發熱又曰弱主筋沉主骨陽浮陰弱血虛筋急柳氏曰氣虛則脈弱寸弱陽虛尺弱陰虛關弱胃氣虛虛遲大而軟按之無力隱指豁豁然空崔氏曰形大力薄其虛可知脈決言尋之不足舉之有餘止言浮脈不見虛狀楊氏曰狀似柳絮散慢而遲滑氏言散大而濡皆散脈非虛也又曰舉之遲大按之松脈狀無涯類谷空莫把芤虛為一例芤遲浮大似慈蔥又曰虛脈浮大而遲按之無力芤脈浮大按之中空芤主脫血虛主血虛主病脈虛身熱主傷暑自汗怔忡驚悸陰虛發熱法當養營益衛寸主血不營心關主腹脹少食尺主骨蒸痹痿傷精脫血經曰血虛脈虛氣來虛微為不及病在內曰久病脈虛者死細細脈小人於微而常有細直而軟若絲線之應指素問謂之小王氏言如莠蓬狀其柔也脈訣言往來極微是微反大於細矣與經相背又曰細來累累細如絲應指沉沉無絕期春夏少年俱不利秋冬老弱卻相宜主病細主血弱氣衰諸虛百損七情六極非濕侵腰腎則傷精汗血寸主嘔吐關主膨脹胃虛尺主丹田冷泄痢遺精陰血耗奪脈經言細為血少氣衰有此證則順否則逆故吐衄脈得沉細者生憂勞過度者脈亦細結結脈往來緩時一止復來脈訣言或來或去聚而卻還與結無關仲景有累累如循長竿曰陰結藹藹如車蓋曰陽結脈經又有如麻子動搖旋引旋收聚散不常者曰結主死此三脈名同實異也又曰結脈緩而時一止獨陰偏勝欲亡陽浮為氣滯沉為積汗下分明在主張主病結脈主血凝氣滯老痰結滯內積外癰腫疝又曰結主陰盛之病越人曰結甚則積甚結微則積微浮結外有痛積伏結內有積聚代代脈動而中止不能自還困而復動脈至還入尺良久方來脈一息五至肺心脾肝腎五臟之氣皆是五十動而一息合大衍之數謂之平脈反此則止代乃見焉腎氣不能至則四十動一止肝氣不能止則三十動一止蓋一臟之氣衰而他臟之氣代至也經曰代則氣衰滑氏曰若無他病羸瘦脈代者危脈也有病而氣血乍損氣不能續者只為病脈傷寒心悸脈代者復脈湯主之妊娠脈代者其胎百日代之生死不可不辨李氏括曰數時一止名為促緩止須將結脈看止不能回方是代結生代死自殊塗又曰促結之止無常數或二動三動一止即來代脈之止有常數必依數而止還入天中良久方來也主病代脈先因臟氣衰腹痛泄痢下元虧或為吐瀉中焦病女子懷胎三月分脈經曰代散者死主泄及膿血促促脈定息數時一止復來如蹶之趣徐疾不常脈經但言數而止為促脈訣乃云並居寸口不言時止者謬矣數止為促緩止為結何獨寸口哉李氏曰促脈數時來一止此為陽極欲亡陰三焦鬱火炎炎盛焦必無生退可生主病促脈惟將火病醫其因有五細推之時時喘咳皆痰積或發狂斑與毒疽又曰促主陽盛之病促結之因皆有氣血痰食飲五者之別一有留滯則脈見止也弦弦脈端直以長如張弓弦按之不移綽綽如按琴瑟弦狀若箏弦從中直過挺然指下弦脈在卦為震在時為春在人為肝輕虛以滑者平實滑如尋長竿者病勁急如新張弓弦者死池氏曰弦緊而數勁為太過弦緊而細為不及戴氏曰弦而軟其病輕弦而硬其病重脈訣言時時帶數又曰脈緊狀繩牽皆非弦象今削之又曰土衰木旺多怒欲叫睛翳淚出李氏曰弦來端直似絲絃緊則如繩左右彈緊言其力弦言象牢緊弦長沉伏間主病弦為肝膽之脈主痰飲寒熱瘧疾又主血弱勞傷胃虛停飲骨脅疼痛肢體拘急多驚單絃病輕雙弦病急寸弦頭痛多痰左關弦主寒熱癥瘕右弦主胃寒心腹痛尺主陰痃腳疾拘攣又曰弦為木盛之病浮弦痰飲外溢沉弦懸飲內痛瘧脈自弦弦數多熱弦遲多寒弦大主虛弦細拘急陽弦頭痛陰弦腹痛單絃飲癖雙弦寒痼若不食者木來剋土病必難治緊緊脈來往有力左右彈人指如轉索無常數如切繩如紉單線又曰緊乃熱如為寒束之脈故急數如此要有神氣素問謂之急脈訣言寥寥入尺來崔氏言如線皆非緊狀或以浮緊為弦沉緊為牢亦近似耳又曰舉如轉索如切繩脈象因之得緊名總是寒邪來作寇內為腹痛外身疼主病緊主諸痛為寒喘咳風癇冷痰浮緊表寒沉緊裡寒人迎緊盛傷寒氣口緊盛傷食關主心腹疼痛尺主陰冷奔豚疝病又曰浮緊中惡沉緊咳嗽實實脈浮沉皆得脈大而長微弦應指愊愊然愊愊緊實貌脈訣言如繩應指來乃緊脈非實也又曰浮沉皆得大而長應指無常愊愊強熱蘊三焦成壯火通腸發汗始能康又曰實脈浮沉有力強緊如彈索轉無常須知牢脈掣筋骨實大微弦更帶長主病實脈為陽火鬱盛發狂譫語吐頻頻為陽毒或傷食大便不通或氣痛寸實主面赤生風咽痛舌強骨中氣寒關主脾熱腹滿尺主腹腰腸間痛而不通經曰血實脈實曰脈實者水穀為病曰氣來實強是為大過脈訣言尺實小便不禁與脈尺實小腹痛小便難之證相反潔古不知其謬以為虛寒用薑附愈誤矣長長脈不大不小迢迢若如循長竿末梢為平如引繩如循長竿曰病又曰長有三部之長一部之長在時為春在人為肝心肝長神強氣壯腎脈長蒂固根深經曰長則氣治皆言平脈也又曰過於本位脈名長弦則非然但滿張弦脈與長爭較遠良工尺度自能量實牢弦緊皆兼長脈主病長脈迢迢大小勻反常為病似牽繩若非陽毒癲癇病即是陽明熱勢深大都長主有餘之病洪洪脈指下極大來盛去衰洪脈在卦為離在時為夏在人為心素問謂之大亦曰鉤滑氏曰來盛去衰如鉤之曲上覆而下應血脈來去之象象萬物敷布下垂之狀詹氏謂如環珠者非也脈訣云季夏宜之秋季冬季發汗通陽俱非洪脈所宜蓋謬也李氏曰脈來洪盛去還衰滿指湧湧應夏時若在春秋冬月分升陽散火莫狐疑又曰洪脈來時拍拍然去衰來盛似波瀾欲知實脈參差處舉按弦長愊愊堅主病脈洪陽盛血應虛相火炎炎熱病居脹滿胃翻須早治陰虛泄痢可愁如寸洪心火上焦炎肺脈洪時金不堪肝火內虛關內察腎虛陰火尺中看又曰洪主陽盛陰虛之病泄痢失血久嗽者忌之經曰形瘦脈大多氣者死又曰大則病進微微脈極細而軟按之如欲絕若有若無細而稍長素問謂之小氣血微則脈微又曰輕診可見按之欲絕者微也往來如線而常有者細也仲景曰脈瞥瞥如羹上肥者陽氣微縈縈如蛛絲細者陰氣衰長病得之死卒病得之生主病氣血微兮脈亦微惡寒發熱汗淋漓胃為勞極諸虛候女作崩中帶下醫寸微氣促或心驚關脈微時脹滿形尺部見之精血弱惡寒消痹痛呻吟又曰微主久虛血弱之病陽微惡寒陰微發熱脈訣云崩中日久成白帶漏下多時骨木枯動動乃數脈見於上下無頭無尾如豆厥厥動搖仲景曰陰陽相摶名曰動陽動則汗出陰動則發熱形冷惡寒此三焦傷也成無己曰陰陽相摶則虛者動故陽虛則陽動陰虛則陰動龐氏曰關前三分為陽關後三分為陰當關之位半陰半陽故動由虛見又曰動脈搖搖數在關無頭無尾豆形圓其源本是陰陽戰虛者補之勝者安脈訣言尋之似有舉之還無不離其處不往不來兩關數見含糊謬妄殊非動脈詹氏言其形數動如鉤如毛者尤謬主病動脈專司痛與驚汗因陽動熱因陰或為泄痢拘攣病男子亡精女子崩牢牢脈似沉似伏實大而長微弦扁鵲曰牢而長者肝木也仲景曰寒則牢堅有牢固之象沈氏曰似沉似伏牢之位也實大弦長牢之體也脈訣不言形狀但言尋之則無按之則有云脈入皮膚辨息難又以牢為死脈皆孟浪謬誤李氏曰弦長實大脈牢堅牢位長居沉伏間革脈芤弦自牢起革虛牢實要詳看主病寒則牢堅里有餘腹心寒痛木乘脾疝氣癥瘕何愁也失血陰虛卻忌之又曰牢主寒實之病木實則為痛扁鵲云軟為虛牢為實失血者脈宜沉細反浮大而牢者死虛病見實脈死脈訣言骨間疼痛氣居於表池氏以為腎傳於脾皆謬妄不經之說散散脈大而散有表無里渙漫不收無統紀無拘束至數不齊或多來少去或去多來少渙漫不收如楊花散漫之象又曰散似楊花散漫飛去來無定至難齊產為生兆胎為墮久病逢之不必醫戴氏曰心脈浮大而散肺脈短澀而散平脈也心脈軟散怔忡肺脈軟散汗出肝脈軟散溢飲脾脈軟散胻腫病脈也若腎脈軟散諸病脈代散死脈也難經曰散脈獨見則危柳氏曰散為氣血俱虛根本脫離之脈產婦得之生孕婦得之墮李氏曰散脈無拘散漫然濡來浮細水中綿浮而遲大為虛脈芤脈中空有兩邊主病左寸怔忡右寸汗溢飲左關應散漫右關軟散胻胕腫散居兩尺魂應斷診壽數戴氏曰脈必滿十動出自難經而脈訣五臟歌皆以四十五動為準乖於經旨柳氏曰古以動數候脈是吃緊語須候五十動乃知至數缺失今人指到脘臂即云見了夫曰五十動豈彈指間事耶故學者當診脈問證聽聲觀色斯備四診而無失五十不止身無病數內有止皆知定四十一止一臟絕四年之後多亡命三十一止即三年二十一止二年應十動一止一年殂更觀氣色兼形證兩動一止三四日三四動止應六七五六一止七八朝次第推之自無失五臟六腑用藥氣味補瀉肝膽溫補涼瀉辛補酸瀉心小腸熱補寒瀉酸補甘瀉肺大腸涼補溫瀉酸補辛瀉腎膀胱寒補熱瀉苦補咸瀉脾胃溫熱補寒涼瀉各從其宜甘補苦瀉三焦命門同心張元素曰五臟更相平也一臟不平所勝平之故云安穀則昌絕谷則亡水去則營散谷消則衛亡神無所居故血不可不養衛不可不溫血溫氣和營衛乃行常有天命五臟五味補瀉肝苦急急食甘緩之甘草以酸瀉之赤芍藥實則瀉其子甘草欲散急食辛以散之川芎以辛補之細辛虛則補其母地黃黃柏心苦緩急食酸以收之五味子以甘瀉之甘草黃耆實則瀉其子甘草欲軟急食鹹以軟芒硝以咸補之澤瀉虛則補其母生薑脾苦濕急食苦以燥之白朮以苦瀉之黃連實則瀉其子桑白皮欲緩急食甘以緩之炙甘草以甘補之人參虛則補其母炒鹽肺苦氣逆急食苦以泄之訶子以辛瀉之桑白皮實則瀉其子澤瀉欲收急食酸以收之白芍藥以酸補之五味子虛則補其母五味子腎苦燥急食辛以潤之黃柏知母以咸瀉之澤瀉實瀉其子芍藥欲堅急食苦以堅之知母以苦補之黃柏虛則補其母五味子張元素曰凡藥之五味隨五臟所入而為補瀉亦不過因其性而調之酸入肝苦入心甘入脾辛入肺鹹入腎辛主散酸主收甘主緩苦主堅咸主軟辛能散結潤燥致津液通氣酸能收緩斂散甘能緩急調中苦能燥濕堅軟咸能軟堅淡能利竅李氏曰甘緩咸收苦燥辛散咸軟淡滲五味之本性一定而不變者也其或補或瀉則因五臟四時而迭相施用者也溫涼寒熱四時之本性也其於五臟補瀉亦迭相用也此特潔古張氏因素問飲食補瀉之義舉數藥以為例耳學者宜因意而充之臟腑虛實標本用藥式肝藏血屬木膽火寄於中主血主目主筋主呼主怒本病諸風眩運僵仆強直瘋癇兩脅腫痛胸脅滿痛嘔血小腹疝痛痃瘕女人經病標病寒熱瘧頭痛吐涎目赤面青多怒耳閉頰腫筋攣卵縮丈夫㿗疝女人少腹腫痛陰病有餘瀉之瀉子甘草行氣香附芎藭瞿麥牽牛橘皮行血紅花鱉甲桃仁莪朮京三稜穿山甲大黃水蛭虻蟲蘇木牡丹皮鎮驚雄黃金箔硃砂真珠代赭石夜明砂胡粉銀箔鉛丹龍骨石決明搜風羌活荊芥薄荷槐子蔓荊白花蛇蟬蛻防風皂角烏頭白附子殭蠶獨活不足補之補母枸杞杜仲狗脊熟地黃苦參萆薢阿膠菟絲子補血當歸牛膝續斷白芍血竭沒藥芎藭補氣天麻柏子仁白朮菊花細辛蜜蒙花決明穀精草生薑本熱寒之瀉木芍藥烏梅澤瀉瀉火黃連黃芩龍膽草苦茶豬膽攻裡大黃標熱發之和解柴胡半夏解肌桂枝麻黃心藏神為君火包絡為相火代君行令主血主言主汗主笑本病諸熱瞀瘈驚或譫語煩亂啼笑罵詈怔忡健忘自汗諸痛癢瘡瘍標病肌熱惡寒戰慄舌不能言面赤目黃心煩熱胸脅滿痛引腰背肘臂火實瀉之瀉子黃連大黃氣甘草人參赤茯苓木通黃柏血丹參丹皮玄參生地黃鎮驚硃砂牛黃紫石英神虛補之補母細辛烏梅酸棗仁陳皮生薑氣桂心澤瀉白茯苓伏神遠志石菖蒲血當歸乳香沒藥熟地黃本熱寒之瀉火黃芩竹葉麥冬硃砂炒鹽涼血地黃梔子天竹黃標熱發之散火甘草獨活麻黃柴胡龍腦脾藏智屬土為萬物之母主營衛主五味主肌肉主四肢本病諸濕腫脹痞滿噯氣大小便閉黃疸痰飲吐瀉霍亂心腹痛飲食不化標病身體胕腫重困嗜臥四肢不舉舌本強痛九竅不通土實瀉之瀉子訶子防風葶藶桑白皮吐豆豉梔子蘿蔔子常山瓜蒂鬱金韭汁藜蘆苦參赤小豆鹽湯苦茶下大黃芒硝青蒙石大戟甘遂續隨子芫花土虛補之氣人參黃耆升麻葛根甘草陳皮藿香葳蕤縮砂木香扁豆血白朮蒼朮白芍膠飴大棗乾薑木瓜烏梅蜂蜜本濕除之燥中宮白朮蒼朮桔皮半夏吳茱萸南星黃豆蔻白芥子燥淨府木通赤茯苓豬苓藿香標濕滲之開鬼門葛根蒼朮麻黃獨活肺藏魄屬金總攝一身元氣主聞主哭主皮毛本病諸氣憤郁諸痿喘嘔氣促咳嗽上逆咳唾膿血下利清水便數而久遺失不禁標病灑淅寒熱傷風自汗肩背痛冷臑前廉痛氣實瀉之瀉子澤瀉葶藶桑白皮地骨皮除濕半夏白礬白茯苓薏苡仁木瓜橘皮瀉火粳米石膏寒水石知母訶子通滯枳殼薄荷乾薑木香厚朴杏仁皂莢桔梗蘇梗氣虛補之補母甘草人參黃耆升麻山藥潤燥蛤蚧阿膠麥門冬貝母天門冬百合天花粉斂肺烏梅粟殼五味子芍藥五倍子本熱清之清金黃芩知母麥冬梔子紫菀天冬沙參本寒溫之溫肺丁香藿香款冬花檀香白豆蔻益智縮砂糯米百合標寒散之解表麻黃蔥白紫蘇腎藏智屬水為天一之源主聽主骨主二陰本病諸寒厥逆骨痿腰痛腰冷如冰足胻腫寒小腹滿急疝瘕大便閉泄吐利腥穢水液澄徹清冷不禁消渴引飲標病發熱不惡熱頭眩頭痛咽痛舌燥脊股後廉痛水強瀉之瀉子大戟牽牛瀉腑澤瀉豬苓車前子防己茯苓水弱補之補母人參山藥氣知母玄參補骨脂砂仁苦參血黃柏枸杞鎖陽熟地黃肉蓯蓉山茱萸阿膠五味子本熱攻之下傷寒少陰證口燥咽乾大承氣湯本寒溫之溫里附子乾薑官桂蜀椒白朮解表麻黃細辛獨活桂枝標熱涼之清熱玄參連翹甘草豬膚命門為相火之源天地之始藏精生血降則為漏升則為逆主三焦元氣本病前後癃閉氣逆裡急疝痛奔豚消渴膏淋精漏精寒赤白濁溺血崩中帶漏火強瀉之瀉相火黃柏知母牡丹皮地骨皮生地黃茯苓玄參寒水石火弱補之益陽附子肉桂益智破故紙沉香角回香川烏硫黃天雄烏藥陽起石胡桃巴戟天丹砂當歸蛤蚧覆盆子精脫固之澀滑牡蠣芡實金櫻子五味子遠志蛤粉山茱萸肉三焦為相火之用分布命門元氣主升降出入遊行天地之間總馭五臟六腑營衛經絡內外上下左右之氣號中清之府上主納中主化下主出本病諸瞀瘈暴病暴死暴喑躁擾狂越譫妄驚駭諸血溢血泄諸氣逆衝上諸瘡瘍痘疹瘤核上熱則喘滿諸嘔吐酸胸痞脅痛飲食不消頭上出汗中熱則善飢而瘦解㑊中滿諸脹腹大諸病有聲鼓之如鼓上下關格不通霍亂吐利下熱則暴注下迫水液混濁下部腫滿小便淋瀝或不通大便閉結或下利上寒則吐飲食痰水胸痹前後引痛食已還出中寒則飲食不化寒脹反胃吐水濕瀉不渴下寒則二便不禁臍腹冷疝痛標病惡寒戰慄如喪神守耳鳴耳聾嗌腫喉痹諸病胕腫疼酸驚駭手小指次指不用實火瀉之汗麻黃柴胡葛根荊芥升麻薄荷羌活石膏上瓜蒂滄鹽韭汁下大黃芒硝虛火補之上人參天雄桂心中人參黃耆丁香木香草果下附子桂心硫黃人參沉香烏梅破故紙本熱寒之上黃芩連翹梔子知母玄參石膏中黃連連翹石膏生地黃標熱散之解表柴胡細辛荊芥羌活葛根石膏膽屬木為少陽相火發生萬物為決斷之官十一臟之主主同肝本病口苦嘔苦汁善太息澹澹如人將捕狀目昏不眠標病寒熱往來痁瘧胸脅痛頭額痛耳痛鳴聾瘰癧結核馬刀足小指次指不用實火瀉之瀉膽龍腦牛膽豬膽生蕤仁生酸棗仁黃連苦茶虛火補之溫膽人參細辛半夏炒蕤仁炒酸棗仁當歸地黃本熱平之降火黃連黃芩芍藥連翹甘草鎮驚黑鉛水銀標熱和之和解柴胡芍藥黃芩半夏甘草胃屬土主容受為水穀之海主同脾本病噎膈反胃中滿腫脹嘔吐瀉痢霍亂腹痛消中善飢不消食傷飲食胃管當心痛走兩脅標病發熱蒸蒸身前熱寒熱發狂譫語咽痹上齒痛口眼喎斜鼻痛鼽衄赤齄胃實瀉之濕熱大黃芒硝飲食巴豆神麯山楂阿魏硇砂鬱金輕粉三稜胃虛補之濕熱蒼朮白朮半夏茯苓橘皮生薑寒濕乾薑附子草果官桂丁香白豆蔻本熱寒之降火石膏地黃犀角黃連標熱解之解肌升麻葛根豆豉大腸屬金主變化為傳送之官本病大便閉結泄痢下血裡急後重疽痔脫肛腸鳴而痛標病齒痛喉痹頸腫口乾咽中如核鼽衄目黃手大指次指痛宿食發熱寒慄腸實瀉之熱大黃芒硝槐花牽牛巴豆郁李仁氣枳殼木香橘皮檳榔腸虛補之氣皂莢燥桃仁麻仁杏仁地黃乳香松子當歸肉蓯蓉濕白朮蒼朮半夏硫黃陷升麻葛根脫龍骨白堊訶子粟殼烏梅白礬赤石脂禹餘糧石榴皮本熱寒之清熱秦艽槐角地黃黃芩本寒溫之溫里附子乾薑肉豆蔻標熱散之解肌石膏白芷升麻葛根小腸主分泌水穀為受盛之官本病大便水穀利小便短小便閉小便血小便自利大便後血小腸氣痛宿食夜熱旦止標病身熱惡寒嗌痛頷腫口糜耳聾實熱瀉之氣木通豬苓滑石瞿麥澤瀉燈草血地黃蒲黃赤茯苓梔子牡丹皮虛寒補之氣白朮楝實茴香砂仁神麯扁豆血桂心玄胡索本熱寒之降火黃柏黃芩黃連連翹梔子標熱散之解肌藁本羌活防風蔓荊膀胱主精液為胞之府氣化乃能出號州都之官諸病皆干之本病小便淋瀝或短數或黃赤或白或遺矢或氣痛標病發熱惡寒頭痛腰脊強鼻窒足小趾不用實熱瀉之瀉火滑石豬苓澤瀉茯苓下虛補之熱黃柏知母寒桔梗升麻益智烏藥山茱萸本熱利之降火地黃梔之茵陳黃柏牡丹皮地骨皮標寒發之發表麻黃桂枝羌活蒼朮防己黃耆木賊引經報使手少陰心經黃連細辛手太陽小腸藁本黃柏足少陰腎獨活知母桂枝細辛足太陽膀胱羌活手太陰肺桔梗白芷升麻蔥白手陽明大腸白芷石膏升麻足太陰脾升麻葛根蒼朮白芍足陽明胃白芷石膏升麻葛根手厥陰心胞絡柴胡牡丹皮石膏足少陽膽柴胡青皮足厥陰肝青皮川芎吳茱萸柴胡手少陽三焦連翹柴胡上地骨皮中青皮下附子五味宜忌岐伯曰木生酸火生苦土生甘金生辛水生咸辛散酸收甘緩苦堅咸軟而毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五味各有所利四時五臟病隨所宜也又曰陰之所生本在五味陰之五宮傷在五味骨正筋柔氣血以流腠理以密骨氣以清長有天命又曰聖人春夏養陽秋冬養陰以崇其根二氣常存春食涼夏食寒以養陽秋食溫冬食熱以養陰五欲肝欲酸心欲苦脾欲甘肺欲辛腎欲咸此五味合五臟之氣也青色宜酸肝病宜食麻犬李韭赤色宜苦心病宜食麥羊杏薤黃色宜甘脾病宜食粳牛棗葵白色宜辛肺病宜食黃黍雞桃蔥黑色宜咸腎病宜食大豆黃卷豬慄藿五禁肝病禁辛宜食甘粳牛棗葵心病禁咸宜食酸麻犬李韭脾病禁酸宜食苦大豆豕慄藿肺病禁苦宜甘麥羊杏薤腎病禁甘宜食辛黃黍雞桃蔥思邈曰春宜省酸增甘以養脾夏宜省苦增辛以養肺秋宜省辛增酸以養肝冬宜省咸增苦以養心四季宜省甘增咸以養腎時珍曰五欲者五味入胃喜歸本臟有餘之病宜本味通之五禁者五臟不足之病畏其所勝而宜其所不勝也五走酸走筋筋病毋多食酸多食令人癃酸氣澀收胞得酸而縮卷故水道不通也苦走骨骨病毋多食苦多食令人變嘔苦入下脘三焦皆閉故變嘔也甘走肉肉病毋多食甘多食令人悗心甘氣柔潤胃柔則緩緩則蟲動故悗心也辛走氣氣病毋多食辛多食令人恫心辛動上焦與氣俱行久留心下故恫心也咸走血血病毋多食鹹多食令人渴血與咸相得則凝凝則胃汁注之故咽路焦而舌本強五傷酸傷筋辛勝酸苦傷氣咸勝苦甘傷肉酸勝甘辛傷皮毛苦勝辛咸傷血甘勝咸五過味過於酸肝氣以津脾氣乃絕肉胝傷䐢而唇揭味過於苦脾氣不濡胃氣乃厚皮槁而毛拔味過於甘心氣喘滿色黑腎氣不平骨痛而發落味過於辛筋脈沮絕精神乃失筋急而爪枯味過於咸大骨氣勞短肌心氣抑脈凝澀而變色時珍曰五走五傷者本臟之味自傷也即陰之五官傷在五味也五過者本臟之味伐其所勝也即臟氣偏勝也五味偏勝岐伯曰五味入胃各歸所喜酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常氣增而久夭之由也王冰曰入肝為溫入心為熱入肺為清入腎為寒入脾為至陰而四氣兼之皆為增其味而益其氣故各從其臟之氣久則從化故久服黃連苦參反熱從苦化也餘味仿此氣不已則臟氣偏勝必有偏絕臟有偏絕必有暴夭是以藥不具五味不備四氣而久服之雖暫獲勝久必致夭故絕粒服餌者不暴亡無五味資助也易曰一陰一陽之謂道偏陰偏陽之謂疾陽劑剛勝積若燎原為消狂癰疽之屬則天癸竭而營涸陰劑柔勝積若凝水為洞泄寒中之病則真火微而衛散故大寒大熱之藥當從權用之氣平而止有所偏助令臟氣不平夭之由也
